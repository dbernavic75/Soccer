<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Soccer Stars - Stable Pro</title>
    <style>
        :root {
            --gold: #ffd700;
            --rarity-1: #95a5a6; --rarity-2: #2ecc71; --rarity-3: #3498db; --rarity-4: #9b59b6; --rarity-5: #f1c40f;
        }
        body { margin: 0; background: #1a472a; color: white; font-family: 'Arial Black', sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* HEADER */
        #header { padding: 8px; background: #000; border-bottom: 2px solid var(--gold); display: flex; justify-content: space-between; align-items: center; z-index: 50; }
        .header-stat { text-align: center; flex: 1; }
        .stat-val { font-size: 18px; color: var(--gold); display: block; }
        .stat-lab { font-size: 8px; text-transform: uppercase; color: #aaa; }
        #reset-btn { background: #ff4444; border: none; color: white; padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; cursor: pointer; }

        /* CAMPO DI GIOCO */
        #game-area { flex: 1; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle, #2e7d32 0%, #1a472a 100%); position: relative; }
        #ball { width: 130px; cursor: pointer; transition: 0.1s; -webkit-tap-highlight-color: transparent; z-index: 5; }
        #ball:active { transform: scale(0.8); }

        /* SCHERMATA SQUADRA */
        #squad-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0f2b1a; z-index: 100; padding: 10px; box-sizing: border-box; overflow-y: auto; padding-bottom: 100px; }
        .section-title { text-align: center; color: var(--gold); font-size: 12px; margin: 15px 0 5px 0; border-bottom: 1px solid rgba(255,215,0,0.3); text-transform: uppercase; }
        .row { display: flex; justify-content: center; gap: 8px; margin-bottom: 10px; min-height: 120px; }
        
        /* CARTE */
        .player-slot { width: 85px; height: 125px; border-radius: 8px; position: relative; background: #222; border: 2px solid #333; overflow: hidden; display: flex; flex-direction: column; cursor: pointer; }
        .empty-label { margin: auto; font-size: 9px; color: #555; text-align: center; text-transform: uppercase; }
        .card-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center; opacity: 0.6; z-index: 1; }
        .card-overlay { position: absolute; bottom: 0; left: 0; width: 100%; height: 60%; background: linear-gradient(to top, black 30%, transparent 100%); z-index: 2; }
        .card-info { position: absolute; bottom: 5px; width: 100%; text-align: center; z-index: 3; }
        .card-pwr { font-size: 14px; color: var(--gold); display: block; font-weight: bold; }
        .card-name { font-size: 7px; text-transform: uppercase; color: #fff; padding: 0 2px; display: block; overflow: hidden; }

        /* PACCHETTO ANIMAZIONE */
        #pack-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; align-items: center; justify-content: center; flex-direction: column; }
        .anim-card { width: 150px; height: 220px; border: 6px solid white; border-radius: 15px; background: #222; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .spinning { animation: spin 0.2s infinite linear; }
        @keyframes spin { 0% { transform: rotateY(0deg); } 100% { transform: rotateY(360deg); } }

        /* BOTTONI E NAV */
        .btn-ui { border: none; font-weight: bold; border-radius: 8px; padding: 12px; cursor: pointer; width: 100%; margin-top: 10px; font-family: 'Arial Black', sans-serif; text-transform: uppercase; }
        #navbar { display: flex; background: #000; padding: 12px 0; border-top: 2px solid var(--gold); position: fixed; bottom: 0; width: 100%; z-index: 200; }
        .nav-item { flex: 1; text-align: center; font-size: 12px; color: #666; cursor: pointer; font-weight: bold; }
        .nav-item.active { color: var(--gold); }
    </style>
</head>
<body>

<div id="header">
    <button id="reset-btn" onclick="resetGame()">RESET</button>
    <div class="header-stat"><span class="stat-lab">I tuoi Tap</span><span id="tap-count" class="stat-val">0</span></div>
</div>

<div id="game-area">
    <img src="https://upload.wikimedia.org/wikipedia/commons/d/d3/Soccerball.svg" id="ball" onclick="doTap()">
</div>

<div id="squad-screen">
    <div id="shop-area" style="text-align: center;"></div>
    <div class="section-title">Titolari</div>
    <div class="row" id="row-pt"></div>
    <div class="row" id="row-df"></div>
    <div class="row" id="row-at"></div>
    <div class="section-title">Riserve</div>
    <div class="row" id="row-res"></div>
</div>

<div id="pack-overlay">
    <div id="anim-card" class="anim-card">?</div>
    <h2 id="pack-res" style="margin-top:20px; color:white; text-transform:uppercase;"></h2>
    <div id="pack-cat" style="font-size:16px; margin-bottom:20px;"></div>
    <button class="btn-ui" id="close-pack" onclick="finishPack()" style="display:none; background:var(--gold); width:200px;">Continua</button>
</div>

<div id="navbar">
    <div class="nav-item active" id="nav-campo" onclick="showGame()">CAMPO</div>
    <div class="nav-item" id="nav-squadra" onclick="showSquad()">SQUADRA</div>
</div>

<script>
    // --- DATABASE NOMI ---
    const DB_TOP = {
        5: [{n:"Gigio Paperonum", r:"PT"}, {n:"Paolo Maldino", r:"DF"}, {n:"Lio Pulce Messi", r:"AT"}],
        4: [{n:"Thibaut Cortese", r:"PT"}, {n:"Ruben Diaspro", r:"DF"}, {n:"Mo Salata", r:"AT"}]
    };
    
    function genName() {
        const p = ["Berto", "Ugo", "Ciro", "Lino", "Vito", "Pino", "Gino"];
        const s = ["Scivolone", "Palo", "Rinvio", "Tunnel", "Cross", "Bomber"];
        return p[Math.floor(Math.random()*p.length)] + " " + s[Math.floor(Math.random()*s.length)];
    }

    // --- LOGICA SALVATAGGIO ---
    let taps = localStorage.getItem('taps_stable') ? parseInt(localStorage.getItem('taps_stable')) : 2000000;
    let squad = JSON.parse(localStorage.getItem('squad_stable')) || { pt:[], df:[], at:[], res_pt:null, res_df:null, res_at:null };

    function save() {
        localStorage.setItem('taps_stable', taps);
        localStorage.setItem('squad_stable', JSON.stringify(squad));
    }

    // --- FUNZIONI GIOCO ---
    function doTap() {
        taps++;
        updateUI();
        save();
    }

    function updateUI() {
        document.getElementById('tap-count').innerText = taps.toLocaleString();
    }

    function showGame() {
        document.getElementById('squad-screen').style.display = 'none';
        document.getElementById('nav-campo').classList.add('active');
        document.getElementById('nav-squadra').classList.remove('active');
    }

    function showSquad() {
        document.getElementById('squad-screen').style.display = 'block';
        document.getElementById('nav-squadra').classList.add('active');
        document.getElementById('nav-campo').classList.remove('active');
        renderSquad();
    }

    function renderSquad() {
        const draw = (p, def) => {
            if(!p) return `<div class="player-slot"><div class="empty-label">${def}</div></div>`;
            const color = [null, "#95a5a6", "#2ecc71", "#3498db", "#9b59b6", "#f1c40f"][p.level];
            return `<div class="player-slot" style="border-color:${color}">
                <div class="card-bg" style="background-image:url('${p.img}')"></div>
                <div class="card-overlay"></div>
                <div class="card-info"><span class="card-pwr">LV ${p.level}</span><span class="card-name">${p.name}</span></div>
            </div>`;
        };

        document.getElementById('row-pt').innerHTML = draw(squad.pt[0], "PORTIERE");
        document.getElementById('row-df').innerHTML = draw(squad.df[0], "DIFENSORE") + draw(squad.df[1], "DIFENSORE");
        document.getElementById('row-at').innerHTML = draw(squad.at[0], "ATTACCANTE") + draw(squad.at[1], "ATTACCANTE");
        document.getElementById('row-res').innerHTML = draw(squad.res_pt, "P. RIS") + draw(squad.res_df, "D. RIS") + draw(squad.res_at, "A. RIS");
        
        document.getElementById('shop-area').innerHTML = `<button class="btn-ui" onclick="buyPack()" style="background:var(--gold); color:black; width:80%;">Compra Pacchetto (300 Tap)</button>`;
    }

    function buyPack() {
        if(taps < 300) return;
        taps -= 300; updateUI(); save();

        const ov = document.getElementById('pack-overlay');
        const anim = document.getElementById('anim-card');
        ov.style.display = 'flex';
        anim.classList.add('spinning');
        anim.innerHTML = "?";
        document.getElementById('pack-res').innerText = "";
        document.getElementById('close-pack').style.display = "none";

        setTimeout(() => {
            anim.classList.remove('spinning');
            
            // PROBABILITÀ
            const r = Math.random();
            let lv = 1;
            if(r < 0.02) lv = 5; else if(r < 0.08) lv = 4; else if(r < 0.25) lv = 3; else if(r < 0.6) lv = 2;

            const roles = ["PT", "DF", "AT"];
            const role = roles[Math.floor(Math.random()*3)];
            
            // Logica riempimento (non riempie tutto subito)
            let key = role.toLowerCase();
            let added = false;
            let name = (lv >= 4) ? (DB_TOP[lv].find(x => x.r === role)?.n || genName()) : genName();
            let p = { name, level: lv, role, img: `https://api.dicebear.com/7.x/avataaars/svg?seed=${name}` };

            if(squad[key].length < (role==="PT"?1:2)) {
                squad[key].push(p);
                added = true;
            } else if(!squad["res_"+key]) {
                squad["res_"+key] = p;
                added = true;
            }

            if(added) {
                anim.innerHTML = `<img src="${p.img}" width="100%">`;
                anim.style.borderColor = [null, "#95a5a6", "#2ecc71", "#3498db", "#9b59b6", "#f1c40f"][lv];
                document.getElementById('pack-res').innerText = p.name;
                document.getElementById('pack-cat').innerText = ["", "ESORDIENTE", "PROMESSA", "FUORICLASSE", "CAMPIONE", "PALLONE D'ORO"][lv];
                document.getElementById('pack-cat').style.color = anim.style.borderColor;
            } else {
                anim.innerHTML = "❌";
                document.getElementById('pack-res').innerText = "Doppione!";
                document.getElementById('pack-cat').innerText = "Nessuno spazio libero";
                document.getElementById('pack-cat').style.color = "white";
            }

            document.getElementById('close-pack').style.display = "block";
            save();
        }, 1200);
    }

    function finishPack() {
        document.getElementById('pack-overlay').style.display = 'none';
        renderSquad();
    }

    function resetGame() {
        if(confirm("Vuoi davvero resettare tutto?")) {
            localStorage.clear();
            location.reload();
        }
    }

    window.onload = updateUI;
</script>
</body>
</html>
