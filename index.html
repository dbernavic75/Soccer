<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Soccer Stars - Elite Manager</title>
    <style>
        :root {
            --gold: #ffd700;
            --rarity-1: #95a5a6; --rarity-2: #2ecc71; --rarity-3: #3498db; --rarity-4: #9b59b6; --rarity-5: #f1c40f;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: #000; color: white; font-family: 'Arial Black', sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* HEADER */
        #header { height: 60px; background: #111; border-bottom: 2px solid var(--gold); display: flex; justify-content: space-between; align-items: center; padding: 0 15px; z-index: 1000; }
        .stat-box { text-align: center; }
        .stat-val { font-size: 18px; color: var(--gold); display: block; }
        .stat-lab { font-size: 8px; text-transform: uppercase; color: #aaa; }
        #reset-btn { background: #ff4444; border: none; color: white; padding: 4px 8px; border-radius: 4px; font-size: 9px; cursor: pointer; }

        /* VIEWPORT PRINCIPALE */
        #main-viewport { flex: 1; position: relative; background: #1a472a; overflow: hidden; }
        .screen { display: none; width: 100%; height: 100%; overflow-y: auto; padding: 10px; padding-bottom: 90px; }

        /* CAMPO (TAP) */
        #screen-campo { display: flex; align-items: center; justify-content: center; background: radial-gradient(circle, #2e7d32 0%, #1a472a 100%); }
        #ball { width: 150px; cursor: pointer; transition: 0.1s; z-index: 10; }
        #ball:active { transform: scale(0.8); }

        /* SQUADRA & CARTE */
        .section-title { text-align: center; color: var(--gold); font-size: 10px; margin: 15px 0 5px; border-bottom: 1px solid rgba(255,215,0,0.3); }
        .row { display: flex; justify-content: center; gap: 5px; margin-bottom: 10px; min-height: 110px; flex-wrap: wrap; }
        .player-slot { width: 75px; height: 115px; border-radius: 6px; position: relative; background: #222; border: 2px solid #333; overflow: hidden; display: flex; flex-direction: column; cursor: pointer; }
        .empty-label { margin: auto; font-size: 8px; color: #555; text-align: center; text-transform: uppercase; }
        .card-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center; opacity: 0.6; z-index: 1; }
        .card-header { position: absolute; top: 2px; width: 100%; display: flex; justify-content: space-between; padding: 0 4px; z-index: 3; }
        .tag-lvl { background: rgba(0,0,0,0.8); color: white; padding: 1px 3px; border-radius: 2px; font-size: 7px; }
        .card-info { position: absolute; bottom: 4px; width: 100%; text-align: center; z-index: 3; background: rgba(0,0,0,0.5); }
        .card-pwr { font-size: 13px; color: var(--gold); display: block; }
        .card-name { font-size: 6px; text-transform: uppercase; color: #fff; white-space: nowrap; overflow: hidden; }

        /* NAVBAR */
        #navbar { height: 70px; display: flex; background: #000; border-top: 2px solid var(--gold); position: relative; z-index: 1000; }
        .nav-item { flex: 1; display: flex; align-items: center; justify-content: center; font-size: 10px; color: #666; cursor: pointer; font-weight: bold; }
        .nav-item.active { color: var(--gold); background: rgba(255,215,0,0.05); }

        /* MODALI */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 5000; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .btn-ui { border: none; font-weight: bold; border-radius: 8px; padding: 12px; cursor: pointer; width: 100%; max-width: 280px; font-family: 'Arial Black', sans-serif; text-transform: uppercase; margin: 5px 0; }
        .btn-ui:disabled { background: #444 !important; color: #888; }

        /* STATS DETAIL */
        .stat-row { display: flex; align-items: center; gap: 5px; margin: 4px 0; font-size: 10px; color: #000; }
        .stat-bar-bg { flex: 1; height: 8px; background: #eee; border-radius: 4px; overflow: hidden; }
        .stat-bar-fill { height: 100%; background: #1a472a; }

        /* ANIMAZIONI */
        .vibrating { animation: vibrate 0.2s infinite; border: 2px solid white !important; }
        .target-sub { animation: vibrate 0.1s infinite; border: 2px solid var(--gold) !important; box-shadow: 0 0 15px var(--gold); }
        @keyframes vibrate { 0% { transform: translate(0); } 25% { transform: translate(1px, 1px); } 50% { transform: translate(-1px, -1px); } 100% { transform: translate(0); } }
    </style>
</head>
<body>

<div id="header">
    <button id="reset-btn" onclick="resetGame()">RESET</button>
    <div class="stat-box"><span class="stat-lab">Bilancio Tap</span><span id="tap-count" class="stat-val">0</span></div>
</div>

<div id="main-viewport">
    <div id="screen-campo" class="screen" style="display: flex;">
        <img src="https://upload.wikimedia.org/wikipedia/commons/d/d3/Soccerball.svg" id="ball" onclick="doTap()">
    </div>

    <div id="screen-squadra" class="screen">
        <div style="text-align: center;">
            <button id="buy-btn" class="btn-ui" style="background: var(--gold); color: black;" onclick="buyPack()">PACCHETTO ELITE (500 TAP)</button>
        </div>
        <div class="section-title">TITOLARI (POTENZA ATTUALE: <span id="team-pwr-label">0</span>)</div>
        <div id="row-pt" class="row"></div>
        <div id="row-df" class="row"></div>
        <div id="row-at" class="row"></div>
        <div class="section-title">RISERVE</div>
        <div id="row-res" class="row"></div>
        <button id="sub-mode-btn" class="btn-ui" style="background: #3498db; color: white; display: none;" onclick="toggleSubMode()">MODALITÀ SOSTITUZIONE</button>
    </div>

    <div id="screen-stadio" class="screen">
        <h2 style="color: var(--gold); text-align: center;">STADIO ELITE</h2>
        <div style="background: rgba(0,0,0,0.5); border: 2px solid var(--gold); border-radius: 15px; padding: 20px; text-align: center;">
            <p style="font-size: 10px; color: #aaa;">SFIDA CORRENTE:</p>
            <h1 id="opp-name">---</h1>
            <p id="opp-pwr">Potenza: ---</p>
            <p style="color: var(--gold); font-size: 12px;">Premio Vittoria: <span id="opp-prize">0</span> Tap</p>
            <button id="start-match-btn" class="btn-ui" style="background: var(--gold); color: black;" onclick="startMatch()">GIOCA PARTITA</button>
            <p id="match-error" style="color: #ff4444; font-size: 9px; margin-top: 10px; display: none;">Ti servono 5 titolari!</p>
        </div>
    </div>
</div>

<div id="navbar">
    <div class="nav-item active" id="nav-campo" onclick="nav('campo')">CAMPO</div>
    <div class="nav-item" id="nav-squadra" onclick="nav('squadra')">SQUADRA</div>
    <div class="nav-item" id="nav-stadio" onclick="nav('stadio')">STADIO</div>
</div>

<div id="details-modal" class="modal">
    <div style="background: #fff; color: #000; border-radius: 15px; padding: 20px; width: 90%; max-width: 300px; position: relative;">
        <button onclick="closeDetails()" style="position:absolute; right:10px; top:10px; background:none; border:none; font-size:24px;">×</button>
        <div id="m-role" style="font-size:9px; color:#666; text-align:center;"></div>
        <div id="m-category" style="font-size:10px; text-align:center; font-weight:bold;"></div>
        <img id="m-img" src="" style="width:80px; margin:10px auto; display:block;">
        <h2 id="m-name" style="text-align:center; margin:5px 0;"></h2>
        <div id="m-stats"></div>
        <div id="m-total" style="text-align:center; font-size:20px; margin:10px 0; font-weight:bold;"></div>
        <button id="upg-btn" class="btn-ui" style="background:#1a472a; color:white;"></button>
    </div>
</div>

<div id="match-modal" class="modal">
    <div id="score-board" style="font-size: 40px; margin-bottom: 10px;">0 - 0</div>
    <div id="match-log" style="background:#000; color:#0f0; width:100%; height:150px; overflow-y:auto; padding:10px; font-family:monospace; font-size:11px; border:1px solid #333; border-radius:8px;"></div>
    <button id="close-match" class="btn-ui" style="display:none; background:white; color:black;" onclick="closeMatch()">RITORNA</button>
</div>

<script>
    // --- DATABASE ---
    const DB_REAL = {
        5: ["Lio Pulce Messi", "Cristiano Ronalda", "Marco Van Bastone", "Lothar Mattonaus", "George Bestia"],
        4: ["Kylian Mbappappé", "Erling Aland", "Luka Modriccia", "Karim Benzemulo", "Neymar Jrre"],
        3: ["Ciro Immobile fermo", "Gigio Paperumma", "Theo Ernannde", "Dusan Vlahoviccia", "Nicolò Barellino"]
    };
    function genNames(c) {
        const n=["Berto","Ugo","Ciro","Lino","Pino","Gino","Vito","Mimo","Tano","Beppe"], s=["Scivolone","Pedalino","Frenato","Rincorsa","Zoppetto","Tirolo","Palo","Traversa"];
        let l=[]; for(let i=0;i<c;i++) l.push(n[Math.floor(Math.random()*n.length)]+" "+s[Math.floor(Math.random()*s.length)]); return l;
    }
    const POOL = { 5:DB_REAL[5], 4:DB_REAL[4], 3:DB_REAL[3], 2:genNames(40), 1:genNames(50) };
    const COLORS = ["","#95a5a6","#2ecc71","#3498db","#9b59b6","#f1c40f"], CATS = ["","ESORDIENTE","PROMESSA","FUORICLASSE","CAMPIONE","PALLONE D'ORO"];
    const LIMITS = [0,30,25,20,15,10], BASE = [0,40,60,90,150,250], VALS = [0,2,4,8,15,30];

    // --- STATO GIOCO ---
    let taps = 2000000;
    let squad = { pt:[], df:[], at:[], res_pt:null, res_df:null, res_at:null };
    let isSubMode = false, selectedSub = null, currentOpponent = null;
    const SAVE_KEY = "soccer_stars_vFinal_Logic";

    function init() {
        let d = localStorage.getItem(SAVE_KEY);
        if(d) {
            let p = JSON.parse(d);
            taps = p.taps || 2000000;
            if(p.squad) squad = p.squad;
        }
        updateUI();
        generateOpponent();
    }

    function save() { localStorage.setItem(SAVE_KEY, JSON.stringify({taps, squad})); }
    function doTap() { taps++; updateUI(); save(); }
    function updateUI() { 
        document.getElementById('tap-count').innerText = taps.toLocaleString('it-IT');
        document.getElementById('buy-btn').disabled = taps < 500;
    }

    // --- NAVIGAZIONE ---
    function nav(target) {
        document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        
        const scr = document.getElementById('screen-' + target);
        scr.style.display = (target === 'campo') ? 'flex' : 'block';
        document.getElementById('nav-' + target).classList.add('active');

        if(target === 'squadra') renderSquad();
        if(target === 'stadio') checkMatchReady();
    }

    // --- LOGICA SQUADRA ---
    function calcStats(p) {
        if(!p) return {total:0};
        const isPT = p.role === "PT", b = BASE[p.level], u = p.upgrades * VALS[p.level], bonus = Math.round(u * 0.4);
        let s = isPT ? { VEL:b+u, PAS:b+u, DEF:Math.round((b+u)*1.5), RIF:Math.round((b+u)*1.5) } : { VEL:b+u, SHO:b+u, PAS:b+u, DEF:b+u, DRI:b+u };
        const keys = Object.keys(s); s[keys[p.bias % keys.length]] += bonus;
        let t = 0; for(let k in s) t += s[k]; return { ...s, total: t };
    }

    function renderSquad() {
        let totalTeamPwr = 0;
        const draw = (p, roleKey, idx, def) => {
            let stateClass = "";
            if(isSubMode) {
                if(!selectedSub && !roleKey.startsWith('res')) stateClass = "vibrating";
                if(selectedSub && roleKey === selectedSub.role && idx === selectedSub.idx) stateClass = "vibrating";
                if(selectedSub && (roleKey === "res_" + selectedSub.role || "res_"+roleKey === selectedSub.role)) stateClass = "target-sub";
            }
            if(!p) return `<div class="player-slot" onclick="handleCard('${roleKey}', ${idx})"><div class="empty-label">${def}</div></div>`;
            const s = calcStats(p);
            if(!roleKey.startsWith('res')) totalTeamPwr += s.total;
            return `<div class="player-slot ${stateClass}" style="border-color:${COLORS[p.level]}" onclick="handleCard('${roleKey}', ${idx})">
                <div class="card-bg" style="background-image:url('${p.img}')"></div>
                <div class="card-header"><span class="tag-lvl">LV ${p.level}</span></div>
                <div class="card-info"><span class="card-pwr">${s.total}</span><span class="card-name">${p.name}</span></div>
            </div>`;
        };

        document.getElementById('row-pt').innerHTML = draw(squad.pt[0], 'pt', 0, 'PT');
        document.getElementById('row-df').innerHTML = draw(squad.df[0], 'df', 0, 'DF') + draw(squad.df[1], 'df', 1, 'DF');
        document.getElementById('row-at').innerHTML = draw(squad.at[0], 'at', 0, 'AT') + draw(squad.at[1], 'at', 1, 'AT');
        document.getElementById('row-res').innerHTML = draw(squad.res_pt, 'res_pt', null, 'RIS PT') + draw(squad.res_df, 'res_df', null, 'RIS DF') + draw(squad.res_at, 'res_at', null, 'RIS AT');
        
        document.getElementById('team-pwr-label').innerText = totalTeamPwr;
        document.getElementById('sub-mode-btn').style.display = (squad.pt.length>=1 && squad.df.length>=2 && squad.at.length>=2) ? "block" : "none";
    }

    function buyPack() {
        if(taps < 500) return;
        taps -= 500; updateUI();
        const r = Math.random(); let lv = r<0.02?5 : r<0.08?4 : r<0.2?3 : r<0.5?2 : 1;
        const name = POOL[lv][Math.floor(Math.random()*POOL[lv].length)];
        const role = ['PT','DF','AT'][Math.floor(Math.random()*3)];
        const p = { name, level: lv, upgrades: 0, role, bias: Math.floor(Math.random()*10), img: `https://api.dicebear.com/7.x/avataaars/svg?seed=${name}${Date.now()}` };
        
        let ok = false; const k = role.toLowerCase();
        if(squad[k].length < (k==='pt'?1:2)) { squad[k].push(p); ok = true; }
        else if(!squad['res_'+k]) { squad['res_'+k] = p; ok = true; }
        
        if(ok) { alert("Trovato: " + name); save(); renderSquad(); }
        else { alert("Slot pieni per questo ruolo!"); taps += 500; updateUI(); }
    }

    function handleCard(role, idx) {
        if(!isSubMode) { 
            let p = (idx === null) ? squad[role] : squad[role][idx]; 
            if(p) openDetails(role, idx); 
            return; 
        }
        if(!selectedSub) { if(role.startsWith('res')) return; selectedSub = { role, idx }; }
        else {
            const isMatch = (role === "res_" + selectedSub.role) || ("res_" + role === selectedSub.role);
            if(isMatch) {
                let tit = squad[selectedSub.role][selectedSub.idx], ris = (idx === null) ? squad[role] : squad[role][idx];
                squad[selectedSub.role][selectedSub.idx] = ris; 
                if(idx === null) squad[role] = tit; else squad[role][idx] = tit;
                save(); toggleSubMode();
            } else { if(!role.startsWith('res')) selectedSub = { role, idx }; }
        }
        renderSquad();
    }

    function toggleSubMode() { 
        isSubMode = !isSubMode; selectedSub = null; 
        const btn = document.getElementById('sub-mode-btn');
        btn.innerText = isSubMode ? "ANNULLA" : "MODALITÀ SOSTITUZIONE";
        btn.style.background = isSubMode ? "#e74c3c" : "#3498db";
        renderSquad(); 
    }

    function openDetails(role, idx) {
        let p = (idx === null) ? squad[role] : squad[role][idx];
        const s = calcStats(p), cost = (p.level * 1000) + (p.upgrades * 500);
        document.getElementById('details-modal').style.display = 'flex';
        document.getElementById('m-role').innerText = p.role;
        document.getElementById('m-category').innerText = CATS[p.level];
        document.getElementById('m-category').style.color = COLORS[p.level];
        document.getElementById('m-name').innerText = p.name;
        document.getElementById('m-img').src = p.img;
        document.getElementById('m-total').innerText = "POTENZA: " + s.total;
        
        let h = ""; const labs = p.role === "PT" ? {VEL:"VEL", PAS:"PAS", DEF:"PRE", RIF:"RIF"} : {VEL:"VEL", SHO:"TIR", PAS:"PAS", DEF:"DIF", DRI:"DRI"};
        for(let k in labs) {
            h += `<div class="stat-row"><span>${labs[k]}</span><div class="stat-bar-bg"><div class="stat-bar-fill" style="width:${Math.min(s[k]/10, 100)}%"></div></div><span>${s[k]}</span></div>`;
        }
        document.getElementById('m-stats').innerHTML = h;
        const upg = document.getElementById('upg-btn');
        upg.disabled = p.upgrades >= LIMITS[p.level] || taps < cost;
        upg.innerText = p.upgrades >= LIMITS[p.level] ? "MAX" : `POTENZIA (${cost})`;
        upg.onclick = () => { if(taps >= cost) { taps -= cost; p.upgrades++; save(); openDetails(role, idx); renderSquad(); updateUI(); } };
    }

    // --- LOGICA STADIO ---
    function checkMatchReady() {
        const isReady = (squad.pt.length >= 1 && squad.df.length >= 2 && squad.at.length >= 2);
        document.getElementById('start-match-btn').disabled = !isReady;
        document.getElementById('match-error').style.display = isReady ? 'none' : 'block';
    }

    function generateOpponent() {
        const teams = ["Scappati di Casa FC", "Real Madrido", "AC Picchia", "Pescara Manzia", "Dopolavoro Ferroviario"];
        const pwr = 500 + Math.floor(Math.random() * 2000);
        currentOpponent = { name: teams[Math.floor(Math.random()*teams.length)], pwr: pwr, prize: pwr * 5 };
        document.getElementById('opp-name').innerText = currentOpponent.name;
        document.getElementById('opp-pwr').innerText = "Potenza: " + pwr;
        document.getElementById('opp-prize').innerText = currentOpponent.prize.toLocaleString();
    }

    function startMatch() {
        document.getElementById('match-modal').style.display = 'flex';
        let log = document.getElementById('match-log'); let hS=0, aS=0, turn=0;
        let myPwr = [...squad.pt, ...squad.df, ...squad.at].reduce((sum, p) => sum + calcStats(p).total, 0);
        log.innerHTML = "FISCHIO D'INIZIO!<br>";
        const msgs = ["Azione a centrocampo...", "Tiro potente!", "Parata!", "Contropiede!", "Fallo!"];
        let matchInt = setInterval(() => {
            turn++; let msg = msgs[Math.floor(Math.random()*msgs.length)];
            let prob = myPwr / (myPwr + currentOpponent.pwr);
            if(Math.random() < 0.25) {
                if(Math.random() < prob) { hS++; log.innerHTML += `<span style="color:var(--gold)">GOAL!</span> ${msg}<br>`; }
                else { aS++; log.innerHTML += `<span style="color:#ff4444">GOL AVV!</span> ${msg}<br>`; }
                document.getElementById('score-board').innerText = `${hS} - ${aS}`;
            } else { log.innerHTML += msg + "<br>"; }
            log.scrollTop = log.scrollHeight;
            if(turn >= 10) {
                clearInterval(matchInt); log.innerHTML += "<b>FINE PARTITA!</b><br>";
                if(hS > aS) { log.innerHTML += `<h2 style="color:var(--gold)">VITTORIA! +${currentOpponent.prize} Tap</h2>`; taps += currentOpponent.prize; }
                else if(hS < aS) { log.innerHTML += `<h2 style="color:#ff4444">SCONFITTA...</h2>`; }
                else { log.innerHTML += `<h2>PAREGGIO!</h2>`; taps += Math.floor(currentOpponent.prize/4); }
                updateUI(); save(); generateOpponent(); document.getElementById('close-match').style.display = 'block';
            }
        }, 600);
    }

    function closeDetails() { document.getElementById('details-modal').style.display='none'; }
    function closeMatch() { document.getElementById('match-modal').style.display='none'; document.getElementById('close-match').style.display='none'; document.getElementById('score-board'
