<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Soccer Stars - Elite Manager</title>
    <style>
        :root {
            --gold: #ffd700;
            --rarity-1: #95a5a6; --rarity-2: #2ecc71; --rarity-3: #3498db; --rarity-4: #9b59b6; --rarity-5: #f1c40f;
        }
        body { margin: 0; background: #1a472a; color: white; font-family: 'Arial Black', sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        #header { padding: 8px; background: #000; border-bottom: 2px solid var(--gold); display: flex; justify-content: space-between; align-items: center; z-index: 50; }
        .header-stat { text-align: center; flex: 1; }
        .stat-val { font-size: 18px; color: var(--gold); display: block; }
        .stat-lab { font-size: 8px; text-transform: uppercase; color: #aaa; }
        #reset-btn { background: #ff4444; border: none; color: white; padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; cursor: pointer; }

        #game-area { flex: 1; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle, #2e7d32 0%, #1a472a 100%); }
        #ball { width: 140px; cursor: pointer; transition: 0.1s; -webkit-tap-highlight-color: transparent; }
        #ball:active { transform: scale(0.8); }

        /* SCHERMATE */
        .screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0f2b1a; z-index: 100; padding: 5px; box-sizing: border-box; overflow-y: auto; padding-bottom: 100px; }
        .section-title { text-align: center; color: var(--gold); font-size: 10px; margin: 10px 0 5px 0; border-bottom: 1px solid rgba(255,215,0,0.3); }
        .row { display: flex; justify-content: center; gap: 5px; margin-bottom: 5px; min-height: 110px; }
        
        /* CARTE */
        .player-slot { width: 75px; height: 110px; border-radius: 6px; position: relative; background: #222; border: 2px solid #333; overflow: hidden; display: flex; flex-direction: column; cursor: pointer; }
        .card-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center; opacity: 0.6; z-index: 1; }
        .card-overlay { position: absolute; bottom: 0; left: 0; width: 100%; height: 60%; background: linear-gradient(to top, black 20%, transparent 100%); z-index: 2; }
        .card-header { position: absolute; top: 2px; width: 100%; display: flex; justify-content: space-between; padding: 0 4px; z-index: 3; box-sizing: border-box; font-size: 7px; }
        .card-info { position: absolute; bottom: 4px; width: 100%; text-align: center; z-index: 3; }
        .card-pwr { font-size: 12px; color: var(--gold); display: block; }
        .card-name { font-size: 6px; text-transform: uppercase; color: #fff; white-space: nowrap; }

        /* MATCH SIMULATOR */
        #match-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000; flex-direction: column; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; }
        #scoreboard { display: flex; align-items: center; gap: 20px; font-size: 30px; margin-bottom: 20px; color: var(--gold); }
        #match-log { background: #111; border: 1px solid #333; width: 100%; height: 150px; overflow-y: hidden; padding: 10px; font-size: 12px; font-family: monospace; color: #0f0; border-radius: 10px; }
        #match-progress { width: 100%; height: 10px; background: #333; margin: 20px 0; border-radius: 5px; }
        #match-bar { height: 100%; width: 0%; background: var(--gold); transition: 0.3s; }

        /* UI */
        .btn-ui { border: none; font-weight: bold; border-radius: 8px; padding: 12px; cursor: pointer; width: 100%; margin-top: 10px; font-family: 'Arial Black', sans-serif; text-transform: uppercase; }
        .btn-ui:disabled { background: #444 !important; color: #888; }
        #navbar { display: flex; background: #000; padding: 12px 0; border-top: 2px solid var(--gold); position: fixed; bottom: 0; width: 100%; z-index: 500; }
        .nav-item { flex: 1; text-align: center; font-size: 10px; color: #666; cursor: pointer; }
        .nav-item.active { color: var(--gold); }
    </style>
</head>
<body>

<div id="header">
    <button id="reset-btn" onclick="resetGame()">RESET</button>
    <div class="header-stat"><span class="stat-lab">I tuoi Tap</span><span id="tap-count" class="stat-val">0</span></div>
</div>

<div id="game-area">
    <img src="https://upload.wikimedia.org/wikipedia/commons/d/d3/Soccerball.svg" id="ball" onclick="doTap()">
</div>

<div id="squad-screen" class="screen">
    <div id="shop-area" style="text-align: center;"></div>
    <div class="section-title">TITOLARI</div>
    <div id="row-pt" class="row"></div>
    <div id="row-df" class="row"></div>
    <div id="row-at" class="row"></div>
    <div class="section-title">RISERVE</div>
    <div id="row-res" class="row"></div>
</div>

<div id="match-screen" class="screen">
    <div style="padding: 20px; text-align: center;">
        <h1 style="color: var(--gold);">STADIO</h1>
        <div id="vs-card" style="background: rgba(255,255,255,0.1); padding: 20px; border-radius: 15px; border: 2px solid var(--gold);">
            <h3>PROSSIMO AVVERSARIO:</h3>
            <h2 id="opp-name">I Pasticcioni FC</h2>
            <p id="opp-power">Potenza: 0</p>
            <p style="font-size: 10px; color: #aaa;">Premio Vittoria: <span id="match-prize" style="color: var(--gold);">0</span> Tap</p>
            <button id="start-match-btn" class="btn-ui" style="background: var(--gold); color: black;" onclick="startMatch()">GIOCA PARTITA</button>
        </div>
        <p id="match-req" style="color: #ff4444; font-size: 10px; margin-top: 10px;"></p>
    </div>
</div>

<div id="match-modal">
    <div id="scoreboard">
        <div style="text-align:center"><small style="font-size:10px; display:block">TU</small><span id="score-home">0</span></div>
        <div>-</div>
        <div style="text-align:center"><small style="font-size:10px; display:block">AVV</small><span id="score-away">0</span></div>
    </div>
    <div id="match-progress"><div id="match-bar"></div></div>
    <div id="match-log"></div>
    <button id="end-match-btn" class="btn-ui" style="display:none; background:white; color:black;" onclick="closeMatch()">CHIUDI</button>
</div>

<div id="navbar">
    <div class="nav-item active" id="nav-campo" onclick="showScreen('game')">CAMPO</div>
    <div class="nav-item" id="nav-squadra" onclick="showScreen('squad')">SQUADRA</div>
    <div class="nav-item" id="nav-match" onclick="showScreen('match')">PARTITA</div>
</div>

<script>
    const SAVE_KEY = "soccer_save_v40";
    const DB_REAL = {
        5: ["Lio Messi", "CR7", "Van Basten", "Matthaus", "Maradona"],
        4: ["Mbappé", "Haaland", "Modric", "Benzema", "Neymar"],
        3: ["Immobile", "Donnarumma", "Theo", "Vlahovic", "Barella"]
    };
    const COLORS = ["", "#95a5a6", "#2ecc71", "#3498db", "#9b59b6", "#f1c40f"];
    const BASE_POWER = [0, 40, 60, 90, 150, 250];

    let taps = 2000000;
    let squad = { pt: [], df: [], at: [], res_pt: null, res_df: null, res_at: null };
    let currentOpponent = null;

    // --- LOGICA SALVATAGGIO ---
    function init() {
        let d = localStorage.getItem(SAVE_KEY);
        if(d) {
            let p = JSON.parse(d);
            taps = p.taps;
            squad = p.squad;
        }
        updateUI();
        generateOpponent();
    }

    function save() {
        localStorage.setItem(SAVE_KEY, JSON.stringify({ taps, squad }));
    }

    function doTap() { taps++; updateUI(); save(); }
    function updateUI() { document.getElementById('tap-count').innerText = taps.toLocaleString(); }

    // --- NAVIGAZIONE ---
    function showScreen(type) {
        document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        
        if(type === 'squad') {
            document.getElementById('squad-screen').style.display = 'block';
            document.getElementById('nav-squadra').classList.add('active');
            renderSquad();
        } else if(type === 'match') {
            document.getElementById('match-screen').style.display = 'block';
            document.getElementById('nav-match').classList.add('active');
            checkMatchRequirements();
        } else {
            document.getElementById('nav-campo').classList.add('active');
        }
    }

    // --- RENDER SQUADRA ---
    function calcPwr(p) { return BASE_POWER[p.level] + (p.upgrades * p.level * 2); }

    function renderSquad() {
        const isFull = (squad.pt.length >= 1 && squad.df.length >= 2 && squad.at.length >= 2);
        const draw = (p, role) => {
            if(!p) return `<div class="player-slot"><div class="empty-label">${role}</div></div>`;
            return `<div class="player-slot" style="border-color:${COLORS[p.level]}">
                <div class="card-bg" style="background-image:url('https://api.dicebear.com/7.x/avataaars/svg?seed=${p.name}')"></div>
                <div class="card-header"><span>LV ${p.level}</span><span>+${p.upgrades}</span></div>
                <div class="card-info"><span class="card-pwr">${calcPwr(p)}</span><span class="card-name">${p.name}</span></div>
            </div>`;
        };

        document.getElementById('row-pt').innerHTML = draw(squad.pt[0], 'PT');
        document.getElementById('row-df').innerHTML = draw(squad.df[0], 'DF') + draw(squad.df[1], 'DF');
        document.getElementById('row-at').innerHTML = draw(squad.at[0], 'AT') + draw(squad.at[1], 'AT');
        document.getElementById('row-res').innerHTML = draw(squad.res_pt, 'RIS') + draw(squad.res_df, 'RIS') + draw(squad.res_at, 'RIS');

        document.getElementById('shop-area').innerHTML = `<button class="btn-ui" onclick="buyPack()" style="background:var(--gold); margin-bottom:10px; width:280px;" ${(taps < 300 || (isFull && squad.res_at)) ? 'disabled' : ''}>${(isFull && squad.res_at) ? 'SQUADRA COMPLETA' : 'COMPRA PACCHETTO (300)'}</button>`;
    }

    function buyPack() {
        if(taps < 300) return;
        taps -= 300;
        let lv = Math.random() < 0.1 ? 3 : Math.random() < 0.4 ? 2 : 1;
        let name = DB_REAL[lv] ? DB_REAL[lv][Math.floor(Math.random()*DB_REAL[lv].length)] : "Player " + Math.floor(Math.random()*999);
        let role = ['pt','df','at'][Math.floor(Math.random()*3)];
        let p = { name, level: lv, upgrades: 0, role };
        
        if(squad[role].length < (role==='pt'?1:2)) squad[role].push(p);
        else if(!squad['res_'+role]) squad['res_'+role] = p;
        
        save(); renderSquad(); updateUI();
    }

    // --- SISTEMA PARTITA ---
    function generateOpponent() {
        const names = ["Crotone Cotto", "Real Madridde", "Scappati di Casa", "Pescara Manzia", "Dopolavoro Ferroviario"];
        const name = names[Math.floor(Math.random()*names.length)];
        let oppSquad = [];
        let totalPwr = 0;
        for(let i=0; i<5; i++) {
            let lv = Math.floor(Math.random()*3)+1;
            let pwr = BASE_POWER[lv] + (Math.floor(Math.random()*10)*lv);
            totalPwr += pwr;
        }
        currentOpponent = { name, power: totalPwr, prize: Math.floor(totalPwr * 5) };
        document.getElementById('opp-name').innerText = name;
        document.getElementById('opp-power').innerText = "Potenza Squadra: " + totalPwr;
        document.getElementById('match-prize').innerText = currentOpponent.prize;
    }

    function checkMatchRequirements() {
        const isReady = (squad.pt.length >= 1 && squad.df.length >= 2 && squad.at.length >= 2);
        const btn = document.getElementById('start-match-btn');
        const req = document.getElementById('match-req');
        if(!isReady) {
            btn.disabled = true;
            req.innerText = "Ti servono almeno 5 titolari per giocare!";
        } else {
            btn.disabled = false;
            req.innerText = "";
        }
    }

    function startMatch() {
        document.getElementById('match-modal').style.display = 'flex';
        let homeScore = 0;
        let awayScore = 0;
        let log = document.getElementById('match-log');
        let bar = document.getElementById('match-bar');
        log.innerHTML = "FISCHIO D'INIZIO!<br>";
        
        let myPower = [...squad.pt, ...squad.df, ...squad.at].reduce((sum, p) => sum + calcPwr(p), 0);
        let progress = 0;
        
        let interval = setInterval(() => {
            progress += 10;
            bar.style.width = progress + "%";
            
            // Eventi casuali
            let r = Math.random();
            if(r < 0.15) {
                let winProb = myPower / (myPower + currentOpponent.power);
                if(Math.random() < winProb) {
                    homeScore++;
                    log.innerHTML += "GOOOAL! Azione corale dei tuoi!<br>";
                } else {
                    awayScore++;
                    log.innerHTML += "GOL AVVERSARIO! Difesa sorpresa...<br>";
                }
                document.getElementById('score-home').innerText = homeScore;
                document.getElementById('score-away').innerText = awayScore;
            } else if(r < 0.3) {
                log.innerHTML += "Contrasto a metà campo... duro!<br>";
            }

            if(progress >= 100) {
                clearInterval(interval);
                log.innerHTML += "--- PARTITA FINITA ---<br>";
                if(homeScore > awayScore) {
                    log.innerHTML += `<span style="color:gold">VITTORIA! Hai guadagnato ${currentOpponent.prize} Tap!</span>`;
                    taps += currentOpponent.prize;
                } else if(homeScore < awayScore) {
                    log.innerHTML += `<span style="color:red">SCONFITTA! I tifosi fischiano.</span>`;
                } else {
                    log.innerHTML += "PAREGGIO! Si va a casa con un punto.";
                    taps += Math.floor(currentOpponent.prize / 4);
                }
                document.getElementById('end-match-btn').style.display = 'block';
                updateUI();
                save();
                generateOpponent();
            }
            log.scrollTop = log.scrollHeight;
        }, 600);
    }

    function closeMatch() {
        document.getElementById('match-modal').style.display = 'none';
        document.getElementById('end-match-btn').style.display = 'none';
        document.getElementById('score-home').innerText = "0";
        document.getElementById('score-away').innerText = "0";
        document.getElementById('match-bar').style.width = "0%";
    }

    function resetGame() { if(confirm("Resetti tutto?")) { localStorage.clear(); location.reload(); } }

    window.onload = init;
</script>
</body>
</html>
