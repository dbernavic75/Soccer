<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Soccer Stars - Risk Mode</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { margin: 0; background: #1a472a; color: white; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #header { padding: 15px; text-align: center; background: rgba(0,0,0,0.8); border-bottom: 1px solid #2e7d32; display: flex; justify-content: space-around; align-items: center; position: relative; }
        .stat-val { font-size: 18px; font-weight: bold; display: block; }
        .stat-lab { font-size: 10px; color: #81c784; text-transform: uppercase; }
        #reset-btn { position: absolute; right: 5px; top: 5px; font-size: 8px; background: rgba(255,0,0,0.3); border: 1px solid red; color: white; padding: 2px 5px; border-radius: 5px; cursor: pointer; }

        #game-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #ball { width: 130px; cursor: pointer; transition: transform 0.1s; user-select: none; }
        #ball:active { transform: scale(0.9); }
        
        #navbar { display: flex; background: #000; padding: 15px 0; border-top: 1px solid #2e7d32; }
        .nav-item { flex: 1; text-align: center; font-size: 11px; color: #666; cursor: pointer; position: relative; }
        .nav-item.active { color: #4caf50; font-weight: bold; }
        .badge { position: absolute; top: -5px; right: 20%; background: red; color: white; border-radius: 50%; padding: 2px 6px; font-size: 10px; font-weight: bold; display: none; }

        #squad-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #13331e; z-index: 10; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        .pitch { display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .row { display: flex; justify-content: center; gap: 10px; width: 100%; min-height: 75px; }
        
        .player-slot { background: rgba(255,255,255,0.05); border: 1px solid #2e7d32; border-radius: 10px; width: 68px; height: 80px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 7px; text-align: center; }
        .player-slot b { font-size: 8px; display: block; margin-top: 2px; }
        
        .lvl-1 { border-color: #888; } 
        .lvl-2 { border-color: #4caf50; color: #4caf50; } 
        .lvl-3 { border-color: #2196f3; color: #2196f3; box-shadow: inset 0 0 5px #2196f3; } 
        .lvl-4 { border-color: #a333c8; color: #a333c8; box-shadow: inset 0 0 8px #a333c8; } 
        .lvl-5 { border-color: #ffd700; color: #ffd700; box-shadow: 0 0 12px #ffd700; background: rgba(255,215,0,0.1); }

        .reserves-container { margin-top: 15px; border-top: 1px dashed #2e7d32; padding-top: 10px; }
        .reserves-label { text-align: center; font-size: 10px; color: #81c784; margin-bottom: 5px; display: block; text-transform: uppercase; }
        
        #spin-section { margin-top: 15px; text-align: center; background: rgba(255,215,0,0.1); padding: 10px; border-radius: 15px; border: 1px solid gold; display: none; }
        #spin-btn { background: gold; color: black; border: none; padding: 10px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; }
        .close-btn { background: #444; color: white; border: none; padding: 12px; width: 100%; border-radius: 10px; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div id="header">
    <button id="reset-btn" onclick="resetGame()">RESET</button>
    <div><span class="stat-lab">Taps</span><span id="tap-count" class="stat-val">0</span></div>
    <div><span class="stat-lab">Giro in</span><span id="spin-points" class="stat-val">0/10</span></div>
</div>

<div id="game-area">
    <img src="https://upload.wikimedia.org/wikipedia/commons/d/d3/Soccerball.svg" id="ball" onclick="doTap()">
    <p id="hint-text" style="color: #81c784; margin-top: 20px; font-size: 12px;">Trova tutti i ruoli!</p>
</div>

<div id="squad-screen">
    <h2 style="text-align:center; margin:0 0 10px 0; font-size: 1em; text-transform: uppercase;">Titolari (1-2-2)</h2>
    <div class="pitch">
        <div class="row" id="row-pt"></div>
        <div class="row" id="row-df"></div>
        <div class="row" id="row-at"></div>
    </div>
    <div class="reserves-container">
        <span class="reserves-label">Riserve (PT-DF-AT)</span>
        <div class="row" id="row-res"></div>
    </div>
    <div id="spin-section">
        <div style="font-size: 11px; color: gold;">🎡 Giri disponibili: <span id="spin-available">0</span></div>
        <button id="spin-btn" onclick="spinWheel()">GIRA RUOTA</button>
    </div>
    <button class="close-btn" onclick="toggleSquad()">CHIUDI</button>
</div>

<div id="navbar">
    <div id="nav-campo" class="nav-item active" onclick="showGame()">🏟️<br>CAMPO</div>
    <div id="nav-squadra" class="nav-item" onclick="toggleSquad()">
        <span id="spin-badge" class="badge">0</span>
        🏃<br>SQUADRA
    </div>
    <div class="nav-item" style="opacity:0.3">💰<br>SHOP</div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const TAP_THRESHOLD = 10;
    const RANK_NAMES = ["DILETTANTE", "PROMESSA", "TOP PLAYER", "FUORICLASSE", "PALLONE D'ORO"];

    let taps = parseInt(localStorage.getItem('taps')) || 0;
    let spins = parseInt(localStorage.getItem('spins')) || 0;
    let squad = JSON.parse(localStorage.getItem('squad_v3')) || {
        pt: [], df: [], at: [],
        res_pt: null, res_df: null, res_at: null
    };

    function updateUI() {
        document.getElementById('tap-count').innerText = taps;
        document.getElementById('spin-points').innerText = (taps % TAP_THRESHOLD) + "/" + TAP_THRESHOLD;
        
        const badge = document.getElementById('spin-badge');
        if (spins > 0) {
            badge.innerText = spins;
            badge.style.display = "block";
        } else {
            badge.style.display = "none";
        }
    }

    function doTap() {
        taps++;
        if (taps % TAP_THRESHOLD === 0) {
            spins++;
            localStorage.setItem('spins', spins);
            if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
        }
        localStorage.setItem('taps', taps);
        if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        updateUI();
    }

    function spinWheel() {
        if (spins <= 0) return;

        spins--;
        localStorage.setItem('spins', spins);

        // Estrazione ruolo casuale tra tutti i possibili (indipendentemente se pieni)
        const allRoles = ['pt', 'df', 'at', 'res_pt', 'res_df', 'res_at'];
        const role = allRoles[Math.floor(Math.random() * allRoles.length)];
        
        const rand = Math.random() * 100;
        let lv = 1;
        if (rand < 1) lv = 5; else if (rand < 5) lv = 4; else if (rand < 15) lv = 3; else if (rand < 45) lv = 2;
        const player = { name: RANK_NAMES[lv-1], level: lv };

        let assigned = false;
        let msg = "";

        // Controllo slot
        if (role === 'pt' && squad.pt.length < 1) { squad.pt.push(player); assigned = true; }
        else if (role === 'df' && squad.df.length < 2) { squad.df.push(player); assigned = true; }
        else if (role === 'at' && squad.at.length < 2) { squad.at.push(player); assigned = true; }
        else if (role === 'res_pt' && !squad.res_pt) { squad.res_pt = player; assigned = true; }
        else if (role === 'res_df' && !squad.res_df) { squad.res_df = player; assigned = true; }
        else if (role === 'res_at' && !squad.res_at) { squad.res_at = player; assigned = true; }

        if (assigned) {
            localStorage.setItem('squad_v3', JSON.stringify(squad));
            msg = "✅ TROVATO: " + player.name + " (" + role.toUpperCase() + ")";
        } else {
            msg = "❌ SLOT " + role.toUpperCase() + " PIENO! Giro sprecato...";
        }

        alert(msg);
        renderSquad();
        updateUI();
    }

    function renderSquad() {
        const rows = { pt: document.getElementById('row-pt'), df: document.getElementById('row-df'), at: document.getElementById('row-at'), res: document.getElementById('row-res') };
        Object.values(rows).forEach(r => r.innerHTML = "");

        squad.pt.forEach(p => rows.pt.innerHTML += createCard(p, "PT"));
        if (squad.pt.length < 1) rows.pt.innerHTML += emptyCard("PT");

        squad.df.forEach(p => rows.df.innerHTML += createCard(p, "DF"));
        while(rows.df.children.length < 2) rows.df.innerHTML += emptyCard("DF");

        squad.at.forEach(p => rows.at.innerHTML += createCard(p, "AT"));
        while(rows.at.children.length < 2) rows.at.innerHTML += emptyCard("AT");

        rows.res.innerHTML += squad.res_pt ? createCard(squad.res_pt, "R-PT") : emptyCard("R-PT");
        rows.res.innerHTML += squad.res_df ? createCard(squad.res_df, "R-DF") : emptyCard("R-DF");
        rows.res.innerHTML += squad.res_at ? createCard(squad.res_at, "R-AT") : emptyCard("R-AT");

        document.getElementById('spin-section').style.display = spins > 0 ? "block" : "none";
        document.getElementById('spin-available').innerText = spins;
    }

    function createCard(p, label) { return `<div class="player-slot lvl-${p.level}"><span>${label}</span><b>${p.name}</b></div>`; }
    function emptyCard(label) { return `<div class="player-slot" style="opacity:0.2"><span>${label}</span><b>VUOTO</b></div>`; }
    function toggleSquad() {
        const screen = document.getElementById('squad-screen');
        screen.style.display = screen.style.display !== 'block' ? 'block' : 'none';
        if (screen.style.display === 'block') renderSquad();
    }
    function showGame() { document.getElementById('squad-screen').style.display = 'none'; updateUI(); }
    function resetGame() { if(confirm("Reset?")) { localStorage.clear(); location.reload(); } }
    updateUI();
</script>
</body>
</html>
