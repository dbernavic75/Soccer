<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Soccer Stars Collector</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { margin: 0; background: #1a472a; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Header pulito */
        #header { padding: 15px; text-align: center; background: rgba(0,0,0,0.5); border-bottom: 1px solid #2e7d32; }
        .stat-box { display: inline-block; margin: 0 10px; }
        .stat-label { font-size: 10px; text-transform: uppercase; color: #81c784; }
        .stat-value { font-size: 18px; font-weight: bold; display: block; }

        #game-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        
        /* Feedback visivo per il tap */
        #ball { width: 140px; cursor: pointer; transition: transform 0.1s; user-select: none; -webkit-tap-highlight-color: transparent; }
        #ball:active { transform: scale(0.85); }
        
        /* Pulsante Ruota */
        #spin-btn { 
            display: none; position: absolute; bottom: 30px; padding: 15px 30px; 
            border-radius: 50px; border: none; background: linear-gradient(45deg, #ffd700, #ff9800); 
            color: #000; font-weight: bold; font-size: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        /* Menù Inferiore */
        #navbar { display: flex; background: #000; padding: 12px 0; padding-bottom: env(safe-area-inset-bottom); border-top: 1px solid #2e7d32; }
        .nav-item { flex: 1; text-align: center; font-size: 11px; cursor: pointer; color: #666; }
        .nav-item.active { color: #4caf50; font-weight: bold; }

        /* Schermata Squadra */
        #squad-screen { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #13331e; z-index: 10; padding: 20px; box-sizing: border-box;
        }
        .players-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 20px; }
        .player-slot { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; border: 1px solid #2e7d32; text-align: center; }
        .lvl-1 { border-color: #aaa; } .lvl-2 { border-color: #4caf50; } .lvl-3 { border-color: #2196f3; } 
        .lvl-4 { border-color: #9c27b0; } .lvl-5 { border-color: #ff9800; color: #ff9800; }

        .close-btn { background: #f44336; color: white; border: none; padding: 10px 20px; border-radius: 5px; margin-top: 20px; width: 100%; }
    </style>
</head>
<body>

<div id="header">
    <div class="stat-box">
        <span class="stat-label">Taps Totali</span>
        <span class="stat-value" id="tap-count">0</span>
    </div>
    <div class="stat-box">
        <span class="stat-label">Progresso Ruota</span>
        <span class="stat-value" id="spin-points">0/100</span>
    </div>
</div>

<div id="game-area">
    <img src="https://upload.wikimedia.org/wikipedia/commons/d/d3/Soccerball.svg" id="ball" onclick="doTap()">
    <p id="hint-text" style="color: #81c784; margin-top: 20px;">Tappa il pallone!</p>
    <button id="spin-btn" onclick="spinWheel()">🎡 GIRA LA RUOTA!</button>
</div>

<div id="squad-screen">
    <h2 style="text-align:center">La Tua Squadra (<span id="squad-count">0</span>/8)</h2>
    <div id="players-list" class="players-grid"></div>
    <button class="close-btn" onclick="toggleSquad()">TORNA AL CAMPO</button>
</div>

<div id="navbar">
    <div id="nav-campo" class="nav-item active" onclick="showGame()">🏟️<br>CAMPO</div>
    <div id="nav-squadra" class="nav-item" onclick="toggleSquad()">🏃<br>SQUADRA</div>
    <div class="nav-item" style="opacity: 0.3;">💰<br>SHOP</div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    // Caricamento dati
    let taps = parseInt(localStorage.getItem('taps')) || 0;
    let players = JSON.parse(localStorage.getItem('players')) || [];

    function updateUI() {
        document.getElementById('tap-count').innerText = taps;
        document.getElementById('squad-count').innerText = players.length;
        
        // Calcolo progresso ruota (es. da 0 a 100)
        let currentProgress = taps % 100;
        document.getElementById('spin-points').innerText = currentProgress + "/100";

        // LOGICA MOSTRA PULSANTE RUOTA:
        // Mostra solo se: hai raggiunto i 100 tap (modulo 0), non sei a 0 tap totali, e hai meno di 8 giocatori
        const canSpin = (currentProgress === 0 && taps > 0 && players.length < 8);
        
        const spinBtn = document.getElementById('spin-btn');
        spinBtn.style.display = canSpin ? "block" : "none";

        // Testo di aiuto se la squadra è piena
        if (players.length >= 8) {
            document.getElementById('hint-text').innerText = "Squadra al completo! 🏆";
        } else {
            document.getElementById('hint-text').innerText = "Tappa il pallone!";
        }
    }

    function doTap() {
        taps++;
        localStorage.setItem('taps', taps);
        
        // Vibrazione leggera al tap
        if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        
        updateUI();
    }

    function spinWheel() {
        if (players.length >= 8) {
            alert("La tua squadra è già al completo (8 giocatori)!");
            return;
        }

        const rand = Math.random() * 100;
        let lv = 1;
        if (rand < 0.5) lv = 5;
        else if (rand < 3) lv = 4;
        else if (rand < 10) lv = 3;
        else if (rand < 35) lv = 2;
        
        const playerNames = ["Panchinaro", "Mediano", "Rifinitore", "Bomber", "Fuoriclasse"];
        const newPlayer = {
            name: playerNames[lv-1],
            level: lv
        };

        players.push(newPlayer);
        localStorage.setItem('players', JSON.stringify(players));
        
        alert("🎉 TROVATO! " + newPlayer.name + " (Livello " + lv + ")");
        
        // Incrementiamo di 1 per "rompere" il modulo 100 e far sparire il tasto
        taps++; 
        localStorage.setItem('taps', taps);
        updateUI();
    }

    function toggleSquad() {
        const screen = document.getElementById('squad-screen');
        const isOpening = screen.style.display !== 'block';
        screen.style.display = isOpening ? 'block' : 'none';
        
        // Gestione classi navbar
        document.getElementById('nav-campo').classList.toggle('active', !isOpening);
        document.getElementById('nav-squadra').classList.toggle('active', isOpening);

        if (isOpening) renderPlayers();
    }

    function showGame() {
        document.getElementById('squad-screen').style.display = 'none';
        document.getElementById('nav-campo').classList.add('active');
        document.getElementById('nav-squadra').classList.remove('active');
    }

    function renderPlayers() {
        const list = document.getElementById('players-list');
        list.innerHTML = "";
        players.forEach(p => {
            list.innerHTML += `
                <div class="player-slot lvl-${p.level}">
                    <span style="font-size:10px">LVL ${p.level}</span><br>
                    <strong>${p.name}</strong>
                </div>`;
        });
    }

    // Inizializzazione
    updateUI();
</script>
</body>
</html>

<div id="squad-screen">
    <h2>La Tua Squadra (5+3)</h2>
    <div id="players-list"></div>
    <button onclick="toggleSquad()" style="margin-top:20px; padding:10px; background:red; color:white; border:none;">CHIUDI</button>
</div>

<div id="navbar">
    <div class="nav-item active" onclick="showGame()">🏟️ CAMPO</div>
    <div class="nav-item" onclick="toggleSquad()">🏃 SQUADRA</div>
    <div class="nav-item">💰 SHOP</div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    let taps = parseInt(localStorage.getItem('taps')) || 0;
    let players = JSON.parse(localStorage.getItem('players')) || [];

    function updateUI() {
        document.getElementById('tap-count').innerText = taps;
        let progress = taps % 100;
        document.getElementById('spin-points').innerText = progress + "/100";
        document.getElementById('spin-btn').style.display = (progress === 0 && taps > 0) ? "block" : "none";
        document.getElementById('spin-btn').disabled = !(progress === 0 && taps > 0);
    }

    function doTap() {
        taps++;
        localStorage.setItem('taps', taps);
        tg.HapticFeedback.impactOccurred('light');
        updateUI();
    }

    function spinWheel() {
        const rand = Math.random() * 100;
        let lv = 1;
        if (rand < 0.5) lv = 5;
        else if (rand < 3) lv = 4;
        else if (rand < 10) lv = 3;
        else if (rand < 35) lv = 2;
        
        const newPlayer = "Player Lv." + lv;
        players.push(newPlayer);
        localStorage.setItem('players', JSON.stringify(players));
        
        alert("🎉 Hai trovato un " + newPlayer + "!");
        taps++; // Evita di rimanere bloccati sul 100
        updateUI();
    }

    function toggleSquad() {
        const screen = document.getElementById('squad-screen');
        screen.style.display = (screen.style.display === 'block') ? 'none' : 'block';
        renderPlayers();
    }

    function renderPlayers() {
        const list = document.getElementById('players-list');
        list.innerHTML = "";
        players.slice(-8).forEach(p => {
            list.innerHTML += `<div class="player-slot">${p}</div>`;
        });
    }

    updateUI();
</script>
</body>

    <script>

        const tg = window.Telegram.WebApp;

        // Mostriamo il nome reale dell'utente Telegram
        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            userElement.innerText = tg.initDataUnsafe.user.first_name;
        }

        function kick() {
    score += 1;
    scoreElement.innerText = score;
    
    // Proviamo a forzare la vibrazione ad ogni click con un impatto forte
    if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.HapticFeedback) {
        window.Telegram.WebApp.HapticFeedback.impactOccurred('heavy');
    }
}
