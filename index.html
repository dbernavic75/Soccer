<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Soccer Stars - Pro Manager</title>
    <style>
        :root {
            --gold: #ffd700;
            --r1: #95a5a6; --r2: #2ecc71; --r3: #3498db; --r4: #9b59b6; --r5: #f1c40f;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { font-family: 'Arial Black', sans-serif; background: #000; color: white; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* HEADER */
        #header { height: 60px; background: #111; border-bottom: 2px solid var(--gold); display: flex; justify-content: space-between; align-items: center; padding: 0 15px; flex-shrink: 0; z-index: 1001; }
        .stat-val { font-size: 18px; color: var(--gold); display: block; }
        .stat-lab { font-size: 8px; text-transform: uppercase; color: #aaa; }

        /* CONTENT */
        #main-content { flex-grow: 1; position: relative; overflow: hidden; }
        .screen { display: none; width: 100%; height: 100%; padding: 15px; overflow-y: auto; padding-bottom: 100px; }

        /* CAMPO */
        #scr-campo { display: flex; align-items: center; justify-content: center; background: radial-gradient(circle, #2e7d32 0%, #1a472a 100%); }
        #ball { width: 160px; cursor: pointer; transition: transform 0.1s; z-index: 10; position: relative; }
        #ball:active { transform: scale(0.85); }

        /* CARTE & SQUADRA */
        .row { display: flex; justify-content: center; gap: 6px; margin-bottom: 10px; min-height: 110px; flex-wrap: wrap; }
        .section-title { text-align: center; color: var(--gold); font-size: 10px; margin: 15px 0 5px; border-bottom: 1px solid rgba(255,215,0,0.3); }
        
        .card { width: 75px; height: 115px; border-radius: 6px; position: relative; background: #222; border: 2px solid #333; overflow: hidden; display: flex; flex-direction: column; cursor: pointer; }
        .card-img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center; opacity: 0.5; z-index: 1; }
        .card-lvl { position: absolute; top: 2px; left: 4px; background: rgba(0,0,0,0.8); color: white; padding: 1px 3px; border-radius: 2px; font-size: 7px; z-index: 3; }
        .card-up-count { position: absolute; top: 2px; right: 4px; background: var(--gold); color: black; padding: 1px 3px; border-radius: 2px; font-size: 7px; font-weight: bold; z-index: 3; }
        .card-info { position: absolute; bottom: 0; width: 100%; text-align: center; z-index: 3; background: rgba(0,0,0,0.8); padding: 2px 0; }
        .card-pwr { font-size: 13px; color: var(--gold); display: block; font-weight: bold; }
        .card-name { font-size: 6px; text-transform: uppercase; color: #fff; white-space: nowrap; }

        /* MODALE */
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index: 4000; align-items:center; justify-content:center; padding: 20px; }
        .modal-box { background: white; color: black; border-radius: 15px; padding: 20px; width: 100%; max-width: 320px; position: relative; }
        .stat-row { display: flex; align-items: center; justify-content: space-between; margin: 6px 0; font-size: 11px; font-weight: bold; }
        .bar-bg { flex: 1; height: 10px; background: #eee; border-radius: 5px; margin: 0 8px; overflow: hidden; }
        .bar-fill { height: 100%; transition: width 0.3s; }
        .modal-player-img { width: 80px; height: 80px; margin: 5px auto; display: block; border-radius: 50%; background: #eee; border: 3px solid gold; }

        /* NAV & PACK */
        #nav { height: 80px; background: #111; border-top: 2px solid var(--gold); display: flex; justify-content: space-around; align-items: center; flex-shrink: 0; z-index: 1001; }
        .nav-item { flex: 1; text-align: center; color: #555; font-size: 11px; font-weight: bold; cursor: pointer; height: 100%; display: flex; align-items: center; justify-content: center; }
        .nav-item.active { color: var(--gold); }
        .btn-ui { background: var(--gold); color: black; border: none; padding: 12px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; text-transform: uppercase; margin: 10px 0; }
        
        #pack-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 5000; align-items: center; justify-content: center; flex-direction: column; }
        .anim-card { width: 150px; height: 220px; border: 6px solid white; border-radius: 12px; background: #222; display: flex; align-items: center; justify-content: center; font-size: 80px; }
        .spinning { animation: spin 0.2s infinite linear; }
        @keyframes spin { 0% { transform: rotateY(0deg); } 100% { transform: rotateY(360deg); } }
    </style>
</head>
<body>

<div id="header">
    <div class="stat-box"><span class="stat-lab">BILANCIO TAP</span><span id="display-taps" class="stat-val">0</span></div>
    <button onclick="clearAll()" style="background:red; color:white; border:none; padding:5px; font-size:9px; border-radius:4px;">RESET</button>
</div>

<div id="main-content">
    <div id="scr-campo" class="screen" style="display: flex;">
        <img src="https://upload.wikimedia.org/wikipedia/commons/d/d3/Soccerball.svg" id="ball" onclick="doTap()">
    </div>

    <div id="scr-squadra" class="screen">
        <button class="btn-ui" onclick="openPack()">APRI PACCHETTO (500 TAP)</button>
        <div class="section-title">TITOLARI (POWER: <span id="team-pwr">0</span>)</div>
        <div class="row" id="row-at"></div>
        <div class="row" id="row-df"></div>
        <div class="row" id="row-pt"></div>
        <div class="section-title">RISERVE</div>
        <div class="row" id="row-res"></div>
    </div>

    <div id="scr-stadio" class="screen">
        <h2 style="color:var(--gold); text-align:center;">STADIO</h2>
        <div style="background:#222; border:2px solid var(--gold); border-radius:15px; padding:20px; text-align:center; margin-top:20px;">
            <h1 id="opp-name">---</h1>
            <p id="opp-pwr">Power: ---</p>
            <button id="match-btn" class="btn-ui" onclick="startMatch()">GIOCA PARTITA</button>
            <div id="match-log" style="height:80px; overflow-y:auto; background:black; color:lime; font-size:10px; margin-top:10px; padding:5px; text-align:left;"></div>
        </div>
    </div>
</div>

<div id="pack-overlay">
    <div id="pack-anim-card" class="anim-card">?</div>
    <h2 id="pack-title" style="margin-top:20px;"></h2>
    <button id="btn-close-pack" class="btn-ui" style="display:none; width:auto; padding:10px 40px;" onclick="closePack()">OK</button>
</div>

<div id="modal-detail" class="modal">
    <div class="modal-box">
        <button onclick="closeModal()" style="position:absolute; right:15px; top:15px; border:none; background:none; font-size:24px;">×</button>
        <img id="m-img" class="modal-player-img" src="">
        <h2 id="m-name" style="text-align:center; margin-bottom:10px;"></h2>
        <div id="m-stats"></div>
        <div style="text-align:center; margin:15px 0;"><span id="m-total" style="font-size:28px; font-weight:bold; color:gold;"></span></div>
        <button id="m-upg" class="btn-ui"></button>
    </div>
</div>

<div id="nav">
    <div class="nav-item active" onclick="move('campo', this)">CAMPO</div>
    <div class="nav-item" onclick="move('squadra', this)">SQUADRA</div>
    <div class="nav-item" onclick="move('stadio', this)">STADIO</div>
</div>

<script>
    const DB = {
        5: ["Messi", "Ronaldo", "Zidane", "Pelé", "Maradona"],
        4: ["Mbappé", "Haaland", "Modric", "De Bruyne", "Neymar"],
        3: ["Lautaro", "Donnarumma", "Theo", "Barella", "Leao"],
        2: ["Inzaghi", "Vieri", "Totti", "Del Piero", "Baggio"],
        1: ["Palo", "Traversa", "Cross", "Angolo", "Rinvio"]
    };
    const COLORS = ["","#95a5a6","#2ecc71","#3498db","#9b59b6","#f1c40f"];
    const LIMITS = [0, 30, 25, 20, 15, 10];
    const BASE_VALUES = [0, 30, 50, 70, 120, 200];

    // CARICAMENTO DATI
    let taps = localStorage.getItem('game_taps') ? parseInt(localStorage.getItem('game_taps')) : 2000000;
    let squad = JSON.parse(localStorage.getItem('game_squad')) || { pt:[], df:[], at:[], res_pt:null, res_df:null, res_at:null };

    function save() {
        localStorage.setItem('game_taps', taps);
        localStorage.setItem('game_squad', JSON.stringify(squad));
    }

    function refresh() {
        document.getElementById('display-taps').innerText = taps.toLocaleString('it-IT');
    }

    function doTap() {
        taps++;
        refresh();
        save();
    }

    function move(id, el) {
        document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('scr-' + id).style.display = (id === 'campo' ? 'flex' : 'block');
        el.classList.add('active');
        if(id === 'squadra') renderSquad();
        if(id === 'stadio') generateOpp();
    }

    function getStats(p) {
        let base = BASE_VALUES[p.level];
        let growth = p.upgrades * (p.level * 2.5);
        let baseVal = base + growth;

        if (!p.special) {
            const keys = ['vel', 'tir', 'dif', 'pas', 'fis'];
            p.special = keys.sort(() => 0.5 - Math.random()).slice(0, 2);
            save();
        }

        let s = {};
        ['vel', 'tir', 'dif', 'pas', 'fis'].forEach(k => {
            if (p.special.includes(k)) s[k] = Math.floor(baseVal * 1.20);
            else s[k] = Math.floor(baseVal * 0.867);
        });
        s.total = s.vel + s.tir + s.dif + s.pas + s.fis;
        return s;
    }

    function renderSquad() {
        let totalPwr = 0;
        const draw = (p, role, idx, label) => {
            if(!p) return `<div class="card" style="opacity:0.4; justify-content:center; align-items:center; font-size:8px;">${label}</div>`;
            let s = getStats(p);
            if(!role.includes('res')) totalPwr += s.total;
            return `<div class="card" style="border-color:${COLORS[p.level]}" onclick="openModal('${role}', ${idx})">
                <div class="card-img" style="background-image:url('https://api.dicebear.com/7.x/avataaars/svg?seed=${p.name}')"></div>
                <div class="card-lvl">LV ${p.level}</div>
                <div class="card-up-count">${p.upgrades}/${LIMITS[p.level]}</div>
                <div class="card-info"><span class="card-pwr">${s.total}</span><span class="card-name">${p.name}</span></div>
            </div>`;
        };

        document.getElementById('row-pt').innerHTML = draw(squad.pt[0], 'pt', 0, 'POR');
        document.getElementById('row-df').innerHTML = draw(squad.df[0], 'df', 0, 'DIF') + draw(squad.df[1], 'df', 1, 'DIF');
        document.getElementById('row-at').innerHTML = draw(squad.at[0], 'at', 0, 'ATT') + draw(squad.at[1], 'at', 1, 'ATT');
        document.getElementById('row-res').innerHTML = draw(squad.res_pt, 'res_pt', null, 'R-PT') + draw(squad.res_df, 'res_df', null, 'R-DF') + draw(squad.res_at, 'res_at', null, 'R-AT');
        document.getElementById('team-pwr').innerText = totalPwr;
    }

    function openModal(role, idx) {
        let p = (idx === null) ? squad[role] : squad[role][idx];
        if(!p) return;
        document.getElementById('modal-detail').style.display = 'flex';
        document.getElementById('m-img').src = `https://api.dicebear.com/7.x/avataaars/svg?seed=${p.name}`;
        document.getElementById('m-name').innerText = p.name;
        updateModalStats(role, idx);
    }

    function updateModalStats(role, idx) {
        let p = (idx === null) ? squad[role] : squad[role][idx];
        let s = getStats(p);
        document.getElementById('m-total').innerText = s.total;
        
        let html = "";
        const lbls = {vel:"Velocità", tir:"Tiro", dif:"Difesa", pas:"Passaggio", fis:"Fisico"};
        for(let k in lbls) {
            let isSpec = p.special.includes(k);
            html += `<div class="stat-row">
                <span style="${isSpec?'color:#2ecc71':''}">${lbls[k]} ${isSpec?'★':''}</span>
                <div class="bar-bg"><div class="bar-fill" style="width:${Math.min(s[k]/10, 100)}%; background:${isSpec?'#2ecc71':'#3498db'}"></div></div>
                <span>${s[k]}</span>
            </div>`;
        }
        document.getElementById('m-stats').innerHTML = html;

        let cost = p.level * 200 * (p.upgrades + 1);
        let btn = document.getElementById('m-upg');
        if(p.upgrades >= LIMITS[p.level]) {
            btn.innerText = "LIVELLO MAX"; btn.disabled = true;
        } else {
            btn.innerText = `POTENZIA (${cost} TAP)`;
            btn.disabled = false;
            btn.onclick = () => {
                if(taps >= cost) { taps -= cost; p.upgrades++; save(); refresh(); updateModalStats(role, idx); }
            };
        }
    }

    function openPack() {
        if(taps < 500) return alert("Pochi Tap!");
        taps -= 500; refresh(); save();
        const overlay = document.getElementById('pack-overlay');
        overlay.style.display = 'flex';
        document.getElementById('pack-anim-card').className = 'anim-card spinning';
        document.getElementById('pack-title').innerText = "SORTEGGIO...";
        document.getElementById('btn-close-pack').style.display = "none";

        setTimeout(() => {
            let lv = Math.random()<0.05?5 : Math.random()<0.15?4 : Math.random()<0.3?3 : Math.random()<0.6?2 : 1;
            let name = DB[lv][Math.floor(Math.random()*DB[lv].length)];
            let role = ['pt','df', 'at'][Math.floor(Math.random()*3)];
            let p = { name, level: lv, upgrades: 0, role: role };
            
            if(squad[role].length < (role==='pt'?1:2)) squad[role].push(p);
            else squad['res_'+role] = p;
            
            save();
            document.getElementById('pack-anim-card').className = 'anim-card';
            document.getElementById('pack-anim-card').style.borderColor = COLORS[lv];
            document.getElementById('pack-anim-card').innerHTML = `<img src="https://api.dicebear.com/7.x/avataaars/svg?seed=${name}" style="width:100%">`;
            document.getElementById('pack-title').innerText = name.toUpperCase();
            document.getElementById('btn-close-pack').style.display = "block";
        }, 1500);
    }

    function closePack() { document.getElementById('pack-overlay').style.display = 'none'; renderSquad(); }
    function closeModal() { document.getElementById('modal-detail').style.display = 'none'; renderSquad(); }
    function generateOpp() {
        let pwr = 500 + Math.floor(Math.random()*2000);
        document.getElementById('opp-name').innerText = "RIVALE CASUALE";
        document.getElementById('opp-pwr').innerText = "Power: " + pwr;
    }
    function startMatch() {
        alert("Simulazione partita in corso...");
        taps += 5000; refresh(); save();
    }
    function clearAll() { if(confirm("Resettare tutto?")) { localStorage.clear(); location.reload(); } }
    
    window.onload = () => { refresh(); move('campo', document.querySelector('.nav-item')); };
</script>
</body>
</html>
