<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Soccer Stars - FIXED</title>
    <style>
        /* RESET TOTALE */
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: sans-serif; background: #000; color: #fff; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* HEADER FISSO */
        #header { 
            height: 60px; background: #111; border-bottom: 2px solid gold; 
            display: flex; justify-content: space-between; align-items: center; padding: 0 15px; flex-shrink: 0; 
        }
        .gold-txt { color: gold; font-weight: bold; font-size: 20px; }

        /* AREA CONTENUTO */
        #content { flex-grow: 1; position: relative; overflow: hidden; }
        .screen { display: none; width: 100%; height: 100%; padding: 20px; overflow-y: auto; }

        /* CAMPO - TAP FUNZIONANTE */
        #screen-campo { display: flex; flex-direction: column; align-items: center; justify-content: center; background: green; }
        #ball { width: 180px; height: 180px; cursor: pointer; transition: transform 0.1s; }
        #ball:active { transform: scale(0.9); }

        /* NAVIGAZIONE - BOTTONI GRANDI */
        #nav { 
            height: 80px; background: #111; border-top: 2px solid gold; 
            display: flex; justify-content: space-around; align-items: center; flex-shrink: 0;
        }
        .nav-btn { 
            padding: 10px; color: #888; font-weight: bold; border: 1px solid #333; border-radius: 5px; 
            min-width: 80px; text-align: center; background: #222;
        }
        .nav-btn.active { color: #000; background: gold; }

        /* MODALI E STADIO */
        .card { background: #222; padding: 15px; border-radius: 10px; border: 1px solid gold; margin-top: 10px; text-align: center; }
        .btn-action { background: gold; color: #000; border: none; padding: 10px; width: 100%; font-weight: bold; margin-top: 10px; border-radius: 5px; }
    </style>
</head>
<body>

<div id="header">
    <div>TAP: <span id="val-taps" class="gold-txt">0</span></div>
    <button onclick="clearAll()" style="background:red; color:white; border:none; padding:5px; font-size:10px;">RESET TOTALE</button>
</div>

<div id="content">
    <div id="scr-campo" class="screen" style="display: flex;">
        <h3 style="margin-bottom: 20px;">TOCCA LA PALLA</h3>
        <img src="https://upload.wikimedia.org/wikipedia/commons/d/d3/Soccerball.svg" id="ball">
    </div>

    <div id="scr-squadra" class="screen">
        <h2>LA TUA SQUADRA</h2>
        <div id="squad-list" class="card">Nessun giocatore</div>
        <button class="btn-action" onclick="buy()">COMPRA GIOCATORE (1000 TAP)</button>
    </div>

    <div id="scr-stadio" class="screen">
        <h2>STADIO</h2>
        <div class="card">
            <p>AVVERSARIO: Team Alpha</p>
            <button class="btn-action" onclick="playMatch()">GIOCA (Vinci 5000)</button>
        </div>
        <div id="log" style="margin-top:10px; font-size:12px; color:lime;"></div>
    </div>
</div>

<div id="nav">
    <div class="nav-btn active" id="btn-campo" onclick="move('campo')">CAMPO</div>
    <div class="nav-btn" id="btn-squadra" onclick="move('squadra')">SQUADRA</div>
    <div class="nav-btn" id="btn-stadio" onclick="move('stadio')">STADIO</div>
</div>

<script>
    // Forza 2 milioni se non esiste il nuovo salvataggio
    let taps = localStorage.getItem('new_soccer_v1') ? parseInt(localStorage.getItem('new_soccer_v1')) : 2000000;
    let players = parseInt(localStorage.getItem('new_players_v1')) || 0;

    function refresh() {
        document.getElementById('val-taps').innerText = taps.toLocaleString();
        document.getElementById('squad-list').innerText = "Giocatori in rosa: " + players;
        localStorage.setItem('new_soccer_v1', taps);
        localStorage.setItem('new_players_v1', players);
    }

    // GESTIONE TAP (Direttamente sull'ID per evitare bug)
    document.getElementById('ball').addEventListener('click', function() {
        taps += 1;
        refresh();
    });

    // NAVIGAZIONE
    function move(id) {
        // Nasconde tutti
        document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));

        // Mostra
        const target = document.getElementById('scr-' + id);
        target.style.display = (id === 'campo') ? 'flex' : 'block';
        document.getElementById('btn-' + id).classList.add('active');
    }

    function buy() {
        if(taps >= 1000) {
            taps -= 1000;
            players++;
            refresh();
        } else { alert("Pochi Tap!"); }
    }

    function playMatch() {
        if(players < 1) { alert("Compra un giocatore!"); return; }
        const log = document.getElementById('log');
        log.innerText = "Giocando...";
        setTimeout(() => {
            taps += 5000;
            log.innerText = "VITTORIA! +5000 Tap";
            refresh();
        }, 800);
    }

    function clearAll() {
        localStorage.clear();
        location.reload();
    }

    // Partenza
    refresh();
</script>
</body>
</html>
