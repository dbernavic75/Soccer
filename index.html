<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Soccer Stars - Elite Manager</title>
    <style>
        :root { --gold: #ffd700; --green: #1a472a; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            margin: 0; background: #000; color: white; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            display: flex; flex-direction: column; height: 100vh; overflow: hidden; 
        }

        /* HEADER */
        #header { 
            height: 60px; background: #111; border-bottom: 2px solid var(--gold); 
            display: flex; justify-content: space-between; align-items: center; padding: 0 20px;
        }
        .stat-box { text-align: center; }
        .stat-val { font-size: 20px; color: var(--gold); font-weight: bold; display: block; }
        .stat-lab { font-size: 9px; text-transform: uppercase; color: #888; }

        /* CONTENITORE SCHERMATE */
        #main-viewport { flex: 1; position: relative; overflow: hidden; background: var(--green); }
        .screen { display: none; width: 100%; height: 100%; overflow-y: auto; padding: 20px; padding-bottom: 100px; }

        /* CAMPO */
        #screen-campo { display: flex; align-items: center; justify-content: center; background: radial-gradient(circle, #2e7d32 0%, #1a472a 100%); }
        #ball { width: 160px; height: 160px; cursor: pointer; transition: transform 0.1s; z-index: 10; }
        #ball:active { transform: scale(0.9); }

        /* NAVBAR */
        #navbar { 
            height: 70px; background: #111; border-top: 2px solid var(--gold); 
            display: flex; justify-content: space-around; align-items: center;
        }
        .nav-btn { color: #666; text-decoration: none; font-size: 11px; font-weight: bold; text-align: center; cursor: pointer; }
        .nav-btn.active { color: var(--gold); }

        /* SQUADRA & CARDS */
        .section-title { color: var(--gold); text-align: center; margin: 15px 0 10px; font-size: 12px; border-bottom: 1px solid #333; }
        .row { display: flex; justify-content: center; gap: 8px; margin-bottom: 10px; }
        .player-slot { 
            width: 75px; height: 110px; background: #222; border: 2px solid #444; 
            border-radius: 8px; position: relative; overflow: hidden; display: flex; flex-direction: column; 
        }
        .card-pwr { position: absolute; top: 5px; right: 5px; color: var(--gold); font-weight: bold; font-size: 12px; z-index: 5; }
        .card-name { position: absolute; bottom: 5px; width: 100%; text-align: center; font-size: 7px; text-transform: uppercase; z-index: 5; }
        .card-img { width: 100%; height: 100%; object-fit: cover; opacity: 0.7; }

        /* BOTTONI */
        .btn { 
            background: var(--gold); color: black; border: none; padding: 12px; 
            border-radius: 8px; font-weight: bold; width: 100%; cursor: pointer; margin: 10px 0;
        }
        .btn:disabled { background: #444; color: #888; }

        /* MODALI */
        .modal { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); z-index: 5000; flex-direction: column; align-items: center; justify-content: center; padding: 20px;
        }
        #match-log { background: #000; border: 1px solid #333; width: 100%; height: 150px; padding: 10px; color: #0f0; font-family: monospace; font-size: 11px; overflow-y: auto; margin: 10px 0; }
    </style>
</head>
<body>

<div id="header">
    <div class="stat-box">
        <span class="stat-lab">Bilancio Tap</span>
        <span id="tap-display" class="stat-val">0</span>
    </div>
    <button onclick="resetData()" style="background:#444; color:white; border:none; padding:5px 10px; border-radius:4px; font-size:10px;">RESET</button>
</div>

<div id="main-viewport">
    <div id="screen-campo" class="screen" style="display: flex;">
        <img src="https://upload.wikimedia.org/wikipedia/commons/d/d3/Soccerball.svg" id="ball" onclick="handleTap()">
    </div>

    <div id="screen-squadra" class="screen">
        <div id="shop-container">
            <button class="btn" id="buy-btn" onclick="buyPack()">COMPRA PACCHETTO (500 TAP)</button>
        </div>
        <div class="section-title">TITOLARI</div>
        <div id="row-tit" class="row" style="flex-wrap: wrap;"></div>
        <div class="section-title">RISERVE</div>
        <div id="row-ris" class="row" style="flex-wrap: wrap;"></div>
    </div>

    <div id="screen-stadio" class="screen">
        <h2 style="text-align:center; color:var(--gold);">ARENA SFIDE</h2>
        <div style="background:#111; padding:20px; border-radius:12px; border:1px solid var(--gold); text-align:center;">
            <h3 id="opp-name">---</h3>
            <p id="opp-pwr">Potenza: ---</p>
            <p style="color:var(--gold)">Premio: <span id="opp-prize">0</span> Tap</p>
            <button class="btn" id="play-btn" onclick="startMatch()">GIOCA PARTITA</button>
        </div>
    </div>
</div>

<div id="navbar">
    <div class="nav-btn active" id="btn-nav-campo" onclick="showScreen('campo')">CAMPO</div>
    <div class="nav-btn" id="btn-nav-squadra" onclick="showScreen('squadra')">SQUADRA</div>
    <div class="nav-btn" id="btn-nav-stadio" onclick="showScreen('stadio')">STADIO</div>
</div>

<div id="match-modal" class="modal">
    <h2 id="match-score" style="font-size:40px;">0 - 0</h2>
    <div id="match-log"></div>
    <button id="close-match" class="btn" style="display:none" onclick="closeMatch()">CHIUDI</button>
</div>

<script>
    // --- DATI DI GIOCO ---
    let gameState = {
        taps: 2000000,
        squadra: [],
        currentOpponent: null
    };

    const SAVE_KEY = "soccer_elite_vFinal";
    const COLORS = ["", "#95a5a6", "#2ecc71", "#3498db", "#9b59b6", "#f1c40f"];

    // --- INIZIALIZZAZIONE ---
    function init() {
        const saved = localStorage.getItem(SAVE_KEY);
        if (saved) {
            gameState = JSON.parse(saved);
            // Assicurati che se il salvataggio è vecchio/vuoto, ci siano i 2M
            if (gameState.taps < 1) gameState.taps = 2000000;
        }
        updateUI();
        generateOpponent();
    }

    function save() {
        localStorage.setItem(SAVE_KEY, JSON.stringify(gameState));
    }

    // --- NAVIGAZIONE ---
    function showScreen(screenId) {
        // Nascondi tutto
        document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));

        // Mostra corrente
        const target = document.getElementById('screen-' + screenId);
        target.style.display = (screenId === 'campo') ? 'flex' : 'block';
        document.getElementById('btn-nav-' + screenId).classList.add('active');

        if (screenId === 'squadra') renderSquadra();
    }

    // --- LOGICA TAP ---
    function handleTap() {
        gameState.taps += 1;
        updateUI();
        save();
    }

    function updateUI() {
        document.getElementById('tap-display').innerText = gameState.taps.toLocaleString('it-IT');
        document.getElementById('buy-btn').disabled = (gameState.taps < 500);
    }

    // --- LOGICA SQUADRA ---
    function buyPack() {
        if (gameState.taps < 500) return;
        gameState.taps -= 500;
        
        const lv = Math.random() > 0.9 ? 5 : Math.random() > 0.7 ? 3 : 1;
        const pwr = (lv * 100) + Math.floor(Math.random() * 50);
        const names = ["Ciro", "Berto", "Lino", "Ugo", "Mimo", "Pippo"];
        const name = names[Math.floor(Math.random()*names.length)] + " FC";
        
        const newPlayer = {
            id: Date.now(),
            name: name,
            level: lv,
            pwr: pwr,
            img: `https://api.dicebear.com/7.x/avataaars/svg?seed=${name}${Date.now()}`
        };

        gameState.squadra.push(newPlayer);
        save();
        updateUI();
        renderSquadra();
    }

    function renderSquadra() {
        const rowTit = document.getElementById('row-tit');
        const rowRis = document.getElementById('row-ris');
        rowTit.innerHTML = ""; rowRis.innerHTML = "";

        gameState.squadra.forEach((p, index) => {
            const html = `
                <div class="player-slot" style="border-color: ${COLORS[p.level]}">
                    <span class="card-pwr">${p.pwr}</span>
                    <img src="${p.img}" class="card-img">
                    <span class="card-name">${p.name}</span>
                </div>
            `;
            if (index < 5) rowTit.innerHTML += html;
            else rowRis.innerHTML += html;
        });
    }

    // --- LOGICA PARTITA ---
    function generateOpponent() {
        const pwr = 300 + Math.floor(Math.random() * 1000);
        gameState.currentOpponent = {
            name: "Team Rival "+Math.floor(Math.random()*99),
            pwr: pwr,
            prize: pwr * 10
        };
        document.getElementById('opp-name').innerText = gameState.currentOpponent.name;
        document.getElementById('opp-pwr').innerText = "Potenza: " + pwr;
        document.getElementById('opp-prize').innerText = (pwr * 10).toLocaleString();
    }

    function startMatch() {
        if (gameState.squadra.length < 5) {
            alert("Ti servono almeno 5 giocatori!");
            return;
        }

        const modal = document.getElementById('match-modal');
        const log = document.getElementById('match-log');
        modal.style.display = 'flex';
        log.innerHTML = "Inizio partita...<br>";
        
        let myPwr = gameState.squadra.slice(0,5).reduce((a,b) => a + b.pwr, 0);
        let scoreH = 0; let scoreA = 0;
        let turn = 0;

        const interval = setInterval(() => {
            turn++;
            if (Math.random() < (myPwr / (myPwr + gameState.currentOpponent.pwr))) {
                scoreH++;
                log.innerHTML += "GOAL PER TE!<br>";
            } else {
                scoreA++;
                log.innerHTML += "GOL AVVERSARIO!<br>";
            }
            document.getElementById('match-score').innerText = `${scoreH} - ${scoreA}`;
            log.scrollTop = log.scrollHeight;

            if (turn >= 5) {
                clearInterval(interval);
                if (scoreH > scoreA) {
                    log.innerHTML += `<br><span style="color:yellow">VITTORIA! +${gameState.currentOpponent.prize} Tap</span>`;
                    gameState.taps += gameState.currentOpponent.prize;
                } else {
                    log.innerHTML += "<br>SCONFITTA...";
                }
                document.getElementById('close-match').style.display = 'block';
                save();
                updateUI();
                generateOpponent();
            }
        }, 800);
    }

    function closeMatch() {
        document.getElementById('match-modal').style.display = 'none';
        document.getElementById('close-match').style.display = 'none';
    }

    function resetData() {
        if(confirm("Vuoi resettare tutto?")) {
            localStorage.clear();
            location.reload();
        }
    }

    window.onload = init;
</script>
</body>
</html>
