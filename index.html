<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Soccer Stars - Elite Manager</title>
    <style>
        :root {
            --gold: #ffd700;
            --rarity-1: #95a5a6; --rarity-2: #2ecc71; --rarity-3: #3498db; --rarity-4: #9b59b6; --rarity-5: #f1c40f;
        }
        body { margin: 0; background: #1a472a; color: white; font-family: 'Arial Black', sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        #header { padding: 8px; background: #000; border-bottom: 2px solid var(--gold); display: flex; justify-content: space-between; align-items: center; z-index: 50; }
        .header-stat { text-align: center; flex: 1; }
        .stat-val { font-size: 18px; color: var(--gold); display: block; }
        .stat-lab { font-size: 8px; text-transform: uppercase; color: #aaa; }
        #reset-btn { background: #ff4444; border: none; color: white; padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; cursor: pointer; }

        #game-area { flex: 1; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle, #2e7d32 0%, #1a472a 100%); }
        #ball { width: 140px; cursor: pointer; transition: 0.1s; -webkit-tap-highlight-color: transparent; }
        #ball:active { transform: scale(0.8); }

        #squad-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0f2b1a; z-index: 100; padding: 5px; box-sizing: border-box; overflow-y: auto; padding-bottom: 100px; }
        .section-title { text-align: center; color: var(--gold); font-size: 10px; margin: 10px 0 5px 0; border-bottom: 1px solid rgba(255,215,0,0.3); }
        .row { display: flex; justify-content: center; gap: 5px; margin-bottom: 5px; min-height: 120px; }
        
        .player-slot { width: 80px; height: 120px; border-radius: 6px; position: relative; background: #222; border: 2px solid #333; overflow: hidden; display: flex; flex-direction: column; cursor: pointer; transition: 0.2s; }
        .empty-label { margin: auto; font-size: 8px; color: #555; text-align: center; text-transform: uppercase; }
        
        .card-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center; opacity: 0.6; z-index: 1; }
        .card-overlay { position: absolute; bottom: 0; left: 0; width: 100%; height: 60%; background: linear-gradient(to top, black 20%, transparent 100%); z-index: 2; }
        .card-header { position: absolute; top: 2px; width: 100%; display: flex; justify-content: space-between; padding: 0 4px; z-index: 3; box-sizing: border-box; }
        .tag-lvl { background: rgba(0,0,0,0.8); color: white; padding: 1px 3px; border-radius: 2px; font-size: 7px; }
        .tag-upg { background: var(--gold); color: black; padding: 1px 3px; border-radius: 2px; font-size: 7px; font-weight: bold; }
        
        .card-info { position: absolute; bottom: 4px; width: 100%; text-align: center; z-index: 3; }
        .card-role-tag { font-size: 6px; color: #aaa; text-transform: uppercase; display: block; }
        .card-pwr { font-size: 14px; color: var(--gold); display: block; line-height: 1; }
        .card-name { font-size: 6px; text-transform: uppercase; color: #fff; white-space: nowrap; }

        .btn-ui { border: none; font-weight: bold; border-radius: 8px; padding: 12px; cursor: pointer; width: 100%; margin-top: 10px; font-family: 'Arial Black', sans-serif; text-transform: uppercase; }
        .btn-ui:disabled { background: #444 !important; color: #888; cursor: not-allowed; }

        #pack-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; align-items: center; justify-content: center; flex-direction: column; }
        .anim-card { width: 140px; height: 210px; border: 6px solid white; border-radius: 12px; background: #222; display: flex; align-items: center; justify-content: center; overflow: hidden; font-size: 60px; }
        .spinning { animation: spin 0.2s infinite linear; }
        @keyframes spin { 0% { transform: rotateY(0deg); } 100% { transform: rotateY(360deg); } }

        @keyframes vibrate {
            0% { transform: translate(0); }
            25% { transform: translate(1px, 1px) rotate(0.5deg); }
            50% { transform: translate(-1px, -1px) rotate(-0.5deg); }
            100% { transform: translate(0); }
        }
        .vibrating { animation: vibrate 0.2s infinite; border: 2px solid white !important; }
        .target-sub { animation: vibrate 0.1s infinite; border: 2px solid var(--gold) !important; box-shadow: 0 0 15px var(--gold); }

        #navbar { display: flex; background: #000; padding: 12px 0; border-top: 2px solid var(--gold); position: fixed; bottom: 0; width: 100%; z-index: 500; }
        .nav-item { flex: 1; text-align: center; font-size: 11px; color: #666; cursor: pointer; font-weight: bold; }
        .nav-item.active { color: var(--gold); }

        #details-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; }
        .modal-content { background: #fff; color: #000; border-radius: 15px; padding: 20px; width: 100%; max-width: 300px; position: relative; }
        .stat-row { display: flex; align-items: center; gap: 5px; margin: 4px 0; font-size: 10px; }
        .stat-bar-bg { flex: 1; height: 8px; background: #eee; border-radius: 4px; overflow: hidden; }
        .stat-bar-fill { height: 100%; background: #1a472a; }
    </style>
</head>
<body>

<div id="header">
    <button id="reset-btn" onclick="resetGame()">RESET</button>
    <div class="header-stat"><span class="stat-lab">I tuoi Tap</span><span id="tap-count" class="stat-val">0</span></div>
</div>

<div id="game-area">
    <img src="https://upload.wikimedia.org/wikipedia/commons/d/d3/Soccerball.svg" id="ball" onclick="doTap()">
</div>

<div id="squad-screen">
    <div id="shop-area" style="text-align: center;"></div>
    <div class="section-title">TITOLARI</div>
    <div id="row-pt" class="row"></div>
    <div id="row-df" class="row"></div>
    <div id="row-at" class="row"></div>
    <div class="section-title">RISERVE</div>
    <div id="row-res" class="row"></div>
    <button id="sub-mode-btn" class="btn-ui" style="background: #3498db; color: white; display: none;" onclick="toggleSubMode()">MODALITÀ SOSTITUZIONE</button>
</div>

<div id="pack-overlay">
    <div id="anim-card" class="anim-card">?</div>
    <h2 id="pack-res" style="color:white; margin-top:15px;"></h2>
    <div id="pack-cat" style="height:20px; font-size:12px;"></div>
    <button class="btn-ui" id="close-pack" onclick="finishPack()" style="display:none; background:var(--gold); width: 200px;">OK</button>
</div>

<div id="details-modal">
    <div class="modal-content">
        <button onclick="closeDetails()" style="position:absolute; right:10px; top:10px; background:none; border:none; font-size:24px; cursor:pointer;">×</button>
        <div id="m-role" style="font-size:9px; color:#666; text-align:center;"></div>
        <div id="m-category" style="font-size:10px; text-align:center; font-weight:bold;"></div>
        <img id="m-img" src="" style="width:80px; margin:10px auto; display:block;">
        <h2 id="m-name" style="text-align:center; margin:5px 0;"></h2>
        <div id="stats-container"></div>
        <div id="m-total" style="text-align:center; font-size:20px; margin:10px 0; font-weight:bold;"></div>
        <button id="upg-action-btn" class="btn-ui" style="background:#1a472a; color:white;"></button>
    </div>
</div>

<div id="navbar">
    <div class="nav-item active" id="nav-campo" onclick="showGame()">CAMPO</div>
    <div class="nav-item" id="nav-squadra" onclick="toggleSquad()">SQUADRA</div>
</div>

<script>
    // --- DATABASE GIOCO ---
    const DB_REAL = {
        5: ["Lio Pulce Messi", "Cristiano Ronalda", "Marco Van Bastone", "Lothar Mattonaus", "George Bestia"],
        4: ["Kylian Mbappappé", "Erling Aland", "Luka Modriccia", "Karim Benzemulo", "Neymar Jrre"],
        3: ["Ciro Immobile fermo", "Gigio Paperumma", "Theo Ernannde", "Dusan Vlahoviccia", "Nicolò Barellino"]
    };

    function genNames(c) {
        const n = ["Berto", "Ugo", "Ciro", "Lino", "Pino", "Gino", "Vito", "Mimo", "Tano", "Beppe"];
        const s = ["Scivolone", "Pedalino", "Frenato", "Rincorsa", "Zoppetto", "Tirolo", "Palo", "Traversa"];
        let l = []; for(let i=0; i<c; i++) l.push(n[Math.floor(Math.random()*n.length)]+" "+s[Math.floor(Math.random()*s.length)]);
        return l;
    }

    const POOL = { 5: DB_REAL[5], 4: DB_REAL[4], 3: DB_REAL[3], 2: genNames(40), 1: genNames(50) };
    const COLORS = ["", "#95a5a6", "#2ecc71", "#3498db", "#9b59b6", "#f1c40f"];
    const CATS = ["", "ESORDIENTE", "PROMESSA", "FUORICLASSE", "CAMPIONE", "PALLONE D'ORO"];
    const LIMITS = [0, 30, 25, 20, 15, 10];
    const BASE = [0, 40, 60, 90, 150, 250];
    const VALS = [0, 2, 4, 8, 15, 30];

    // --- SALVATAGGIO BLINDATO (Anticrash) ---
    const SAVE_KEY = "soccer_save_v30";
    let taps = 2000000;
    let squad = { pt: [], df: [], at: [], res_pt: null, res_df: null, res_at: null };
    let isSubMode = false;
    let selectedSub = null;

    function initGame() {
        try {
            let data = localStorage.getItem(SAVE_KEY);
            if (data) {
                let p = JSON.parse(data);
                // Controllo e ripristino sicuro dei Tap
                if (typeof p.taps === 'number' && !isNaN(p.taps)) taps = p.taps;
                
                // Controllo e ripristino sicuro della Squadra (evita l'errore "not iterable")
                if (p.squad) {
                    squad.pt = Array.isArray(p.squad.pt) ? p.squad.pt : [];
                    squad.df = Array.isArray(p.squad.df) ? p.squad.df : [];
                    squad.at = Array.isArray(p.squad.at) ? p.squad.at : [];
                    squad.res_pt = p.squad.res_pt || null;
                    squad.res_df = p.squad.res_df || null;
                    squad.res_at = p.squad.res_at || null;
                }
            }
        } catch(e) {
            console.error("Dati di salvataggio corrotti, ripristino base in corso...");
        }
        updateUI();
        renderSquad();
    }

    function saveGame() {
        localStorage.setItem(SAVE_KEY, JSON.stringify({ taps: taps, squad: squad }));
    }

    // --- FUNZIONI PRINCIPALI ---
    function doTap() { 
        taps++; 
        updateUI(); 
        saveGame(); 
    }

    function updateUI() { 
        document.getElementById('tap-count').innerText = taps.toLocaleString('it-IT'); 
    }

    function getRoleName(r) {
        if(r.includes("PT")) return "Portiere";
        if(r.includes("DF")) return "Difensore";
        return "Attaccante";
    }

    function calcStats(p) {
        const isPT = p.role.includes("PT");
        const b = BASE[p.level], u = p.upgrades * VALS[p.level], bonus = Math.round(u * 0.4);
        let s = isPT ? { VEL:b+u, PAS:b+u, DEF:Math.round((b+u)*1.5), RIF:Math.round((b+u)*1.5) } : { VEL:b+u, SHO:b+u, PAS:b+u, DEF:b+u, DRI:b+u };
        const keys = Object.keys(s);
        s[keys[p.bias % keys.length]] += bonus;
        s[keys[(p.bias + 1) % keys.length]] -= bonus;
        let t = 0; for(let k in s) t += s[k];
        return { ...s, total: t };
    }

    // --- RENDER SQUADRA E PACCHETTI ---
    function renderSquad() {
        const isFull = (squad.pt.length >= 1 && squad.df.length >= 2 && squad.at.length >= 2 && squad.res_pt && squad.res_df && squad.res_at);

        const draw = (p, roleKey, idx, defaultRole) => {
            let stateClass = "";
            if(isSubMode) {
                if(!selectedSub) stateClass = "vibrating";
                if(selectedSub && roleKey === selectedSub.role && idx === selectedSub.idx) stateClass = "vibrating";
                if(selectedSub && (roleKey === "res_" + selectedSub.role || "res_"+roleKey === selectedSub.role)) stateClass = "target-sub";
            }

            if(!p) return `<div class="player-slot"><div class="empty-label">${getRoleName(defaultRole)}</div></div>`;
            
            const s = calcStats(p);
            return `<div class="player-slot ${stateClass}" style="border-color:${COLORS[p.level]}" onclick="handleCard('${roleKey}', ${idx})">
                <div class="card-bg" style="background-image:url('${p.img}')"></div><div class="card-overlay"></div>
                <div class="card-header"><span class="tag-lvl">LV ${p.level}</span><span class="tag-upg">${p.upgrades >= LIMITS[p.level] ? 'MAX' : p.upgrades}</span></div>
                <div class="card-info">
                    <span class="card-role-tag">${getRoleName(p.role)}</span>
                    <span class="card-pwr">${s.total}</span>
                    <span class="card-name">${p.name}</span>
                </div>
            </div>`;
        };

        document.getElementById('row-pt').innerHTML = draw(squad.pt[0], 'pt', 0, 'PT');
        document.getElementById('row-df').innerHTML = draw(squad.df[0], 'df', 0, 'DF') + draw(squad.df[1], 'df', 1, 'DF');
        document.getElementById('row-at').innerHTML = draw(squad.at[0], 'at', 0, 'AT') + draw(squad.at[1], 'at', 1, 'AT');
        document.getElementById('row-res').innerHTML = draw(squad.res_pt, 'res_pt', null, 'PT') + draw(squad.res_df, 'res_df', null, 'DF') + draw(squad.res_at, 'res_at', null, 'AT');
        
        // MODIFICA RICHIESTA: Se il team è pieno disabilita e cambia testo
        let btnText = isFull ? "SQUADRA COMPLETA" : "PACCHETTO (300 TAP)";
        document.getElementById('shop-area').innerHTML = `<button class="btn-ui" onclick="buyPack()" style="background:var(--gold); margin-bottom:15px; width:280px;" ${taps < 300 || isFull ? 'disabled' : ''}>${btnText}</button>`;
        
        document.getElementById('sub-mode-btn').style.display = isFull ? "block" : "none";
    }

    function buyPack() {
        if(taps < 300) return;
        taps -= 300; 
        updateUI(); 
        saveGame();
        
        const ov = document.getElementById('pack-overlay');
        const anim = document.getElementById('anim-card');
        ov.style.display = 'flex';
        anim.classList.add('spinning');
        anim.innerHTML = "?";
        anim.style.borderColor = "white";
        document.getElementById('pack-res').innerText = "";
        document.getElementById('pack-cat').innerText = "";
        
        setTimeout(() => {
            anim.classList.remove('spinning');
            const r = Math.random();
            let lv = r<0.02?5 : r<0.08?4 : r<0.2?3 : r<0.5?2 : 1;
            const name = POOL[lv][Math.floor(Math.random()*POOL[lv].length)];
            
            // CONTROLLO DOPPIONE SCARTATO AUTOMATICAMENTE
            const allInSquad = [...squad.pt, ...squad.df, ...squad.at, squad.res_pt, squad.res_df, squad.res_at].filter(x => x);
            if(allInSquad.some(p => p.name === name)) {
                anim.innerHTML = "❌";
                anim.style.borderColor = "#ff4444";
                document.getElementById('pack-res').innerText = "DOPPIONE!";
                document.getElementById('pack-cat').innerText = name.toUpperCase();
                document.getElementById('pack-cat').style.color = "#ff4444";
            } else {
                const role = ['PT','DF','AT'][Math.floor(Math.random()*3)];
                const p = { name, level: lv, upgrades: 0, role, bias: Math.floor(Math.random()*10), img: `https://api.dicebear.com/7.x/avataaars/svg?seed=${name}` };
                
                let ok = false; 
                const k = role.toLowerCase();
                if(squad[k].length < (k==='pt'?1:2)) { squad[k].push(p); ok = true; }
                else if(!squad['res_'+k]) { squad['res_'+k] = p; ok = true; }

                if(ok) {
                    anim.innerHTML = `<img src="${p.img}" width="100%">`;
                    anim.style.borderColor = COLORS[lv];
                    document.getElementById('pack-res').innerText = name.toUpperCase();
                    document.getElementById('pack-cat').innerText = CATS[lv];
                    document.getElementById('pack-cat').style.color = COLORS[lv];
                    saveGame(); 
                    renderSquad();
                } else {
                    anim.innerHTML = "🚫";
                    document.getElementById('pack-res').innerText = "SLOT PIENI!";
                }
            }
            document.getElementById('close-pack').style.display = "block";
        }, 1200);
    }

    // --- GESTIONE CARTE E SOSTITUZIONI ---
    function handleCard(role, idx) {
        if(!isSubMode) { 
            let p = (idx === null) ? squad[role] : squad[role][idx];
            if(p) openDetails(role, idx); 
            return; 
        }

        if(!selectedSub) {
            if(role.startsWith('res')) return; 
            selectedSub = { role, idx };
        } else {
            const isMatch = (role === "res_" + selectedSub.role) || ("res_" + role === selectedSub.role);
            if(isMatch) {
                let titolare = squad[selectedSub.role][selectedSub.idx];
                let riserva = (idx === null) ? squad[role] : squad[role][idx];
                
                squad[selectedSub.role][selectedSub.idx] = riserva;
                if(idx === null) squad[role] = titolare; else squad[role][idx] = titolare;
                
                saveGame(); 
                toggleSubMode();
            } else {
                if(!role.startsWith('res')) selectedSub = { role, idx };
            }
        }
        renderSquad();
    }

    function toggleSubMode() { 
        isSubMode = !isSubMode; 
        selectedSub = null; 
        const btn = document.getElementById('sub-mode-btn');
        btn.innerText = isSubMode ? "ANNULLA SOSTITUZIONE" : "MODALITÀ SOSTITUZIONE";
        btn.style.background = isSubMode ? "#e74c3c" : "#3498db";
        renderSquad(); 
    }

    // --- DETTAGLI E POTENZIAMENTI ---
    function openDetails(role, idx) {
        let p = (idx === null) ? squad[role] : squad[role][idx];
        const s = calcStats(p);
        const cost = (p.level * 2000) + (p.upgrades * 800);
        
        document.getElementById('details-modal').style.display = 'flex';
        document.getElementById('m-role').innerText = getRoleName(p.role);
        document.getElementById('m-category').innerText = CATS[p.level];
        document.getElementById('m-category').style.color = COLORS[p.level];
        document.getElementById('m-name').innerText = p.name;
        document.getElementById('m-img').src = p.img;
        document.getElementById('m-total').innerText = `POWER: ${s.total}`;
        
        let h = "";
        const labels = p.role.includes("PT") ? {VEL:"VEL", PAS:"PAS", DEF:"PRE", RIF:"RIF"} : {VEL:"VEL", SHO:"TIR", PAS:"PAS", DEF:"DIF", DRI:"DRI"};
        for(let k in labels) {
            h += `<div class="stat-row"><span>${labels[k]}</span><div class="stat-bar-bg"><div class="stat-bar-fill" style="width:${Math.min(s[k]/10, 100)}%"></div></div><span>${s[k]}</span></div>`;
        }
        document.getElementById('stats-container').innerHTML = h;

        const btn = document.getElementById('upg-action-btn');
        btn.disabled = p.upgrades >= LIMITS[p.level] || taps < cost;
        btn.innerText = p.upgrades >= LIMITS[p.level] ? "MAX RAGGIUNTO" : `POTENZIA (${cost})`;
        btn.onclick = () => { 
            if (taps >= cost) { 
                taps -= cost; 
                p.upgrades++; 
                saveGame(); 
                openDetails(role, idx); 
                renderSquad(); 
                updateUI(); 
            } 
        };
    }

    // --- NAVIGAZIONE E UTILITIES ---
    function showGame() { 
        document.getElementById('squad-screen').style.display = 'none'; 
        document.getElementById('nav-campo').classList.add('active'); 
        document.getElementById('nav-squadra').classList.remove('active'); 
    }
    
    function toggleSquad() { 
        document.getElementById('squad-screen').style.display = 'block'; 
        document.getElementById('nav-squadra').classList.add('active'); 
        document.getElementById('nav-campo').classList.remove('active'); 
        renderSquad(); 
    }
    
    function closeDetails() { document.getElementById('details-modal').style.display='none'; }
    function finishPack() { document.getElementById('pack-overlay').style.display='none'; document.getElementById('close-pack').style.display='none'; }
    
    function resetGame() { 
        if(confirm("Vuoi azzerare completamente il tuo file di salvataggio?")) { 
            localStorage.clear(); 
            location.reload(); 
        } 
    }

    // Avvia tutto non appena la pagina ha caricato l'HTML
    window.onload = initGame;
</script>
</body>
</html>
