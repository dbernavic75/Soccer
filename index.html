<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Super Soccer Clicker</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { margin: 0; background: #1a472a; color: white; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Header */
        #header { padding: 15px; text-align: center; background: rgba(0,0,0,0.8); border-bottom: 1px solid #2e7d32; display: flex; justify-content: space-around; align-items: center; position: relative; }
        .stat-val { font-size: 18px; font-weight: bold; display: block; }
        .stat-lab { font-size: 10px; color: #81c784; text-transform: uppercase; }
        #reset-btn { position: absolute; right: 5px; top: 5px; font-size: 8px; background: rgba(255,0,0,0.3); border: 1px solid red; color: white; padding: 2px 5px; border-radius: 5px; cursor: pointer; }

        /* Area Campo */
        #game-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        #ball { width: 140px; cursor: pointer; transition: transform 0.1s; user-select: none; }
        #ball:active { transform: scale(0.9); }
        
        /* Navbar */
        #navbar { display: flex; background: #000; padding: 15px 0; border-top: 1px solid #2e7d32; }
        .nav-item { flex: 1; text-align: center; font-size: 11px; color: #666; cursor: pointer; position: relative; }
        .nav-item.active { color: #4caf50; font-weight: bold; }
        .badge { position: absolute; top: -5px; right: 20%; background: red; color: white; border-radius: 50%; padding: 2px 6px; font-size: 10px; font-weight: bold; display: none; }

        /* Schermata Squadra */
        #squad-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #13331e; z-index: 10; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        .pitch { display: flex; flex-direction: column; align-items: center; gap: 8px; margin-top: 5px; }
        .row { display: flex; justify-content: center; gap: 10px; width: 100%; min-height: 75px; }
        .player-slot { background: rgba(255,255,255,0.05); border: 1px solid #2e7d32; border-radius: 10px; width: 65px; height: 75px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 9px; text-align: center; }
        
        .reserves-container { margin-top: 15px; border-top: 1px dashed #2e7d32; padding-top: 10px; width: 100%; }
        .reserves-label { text-align: center; font-size: 11px; color: #81c784; margin-bottom: 5px; display: block; text-transform: uppercase; }
        
        /* Nuova sezione Ruota nella Squadra */
        #spin-section { margin-top: 15px; text-align: center; background: rgba(255,215,0,0.1); padding: 10px; border-radius: 15px; border: 1px solid gold; display: none; }
        #spin-btn { background: gold; color: black; border: none; padding: 10px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; margin-top: 5px; }
        
        .lvl-5 { border-color: gold; color: gold; box-shadow: 0 0 8px gold; }
        .close-btn { background: #444; color: white; border: none; padding: 12px; width: 100%; border-radius: 10px; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

<div id="header">
    <button id="reset-btn" onclick="resetGame()">RESET TEST</button>
    <div><span class="stat-lab">Taps</span><span id="tap-count" class="stat-val">0</span></div>
    <div><span class="stat-lab">Progresso</span><span id="spin-points" class="stat-val">0/100</span></div>
</div>

<div id="game-area">
    <img src="https://upload.wikimedia.org/wikipedia/commons/d/d3/Soccerball.svg" id="ball" onclick="doTap()">
    <p id="hint-text" style="color: #81c784; margin-top: 20px; font-size: 14px;">Tappa il pallone!</p>
</div>

<div id="squad-screen">
    <h2 style="text-align:center; margin-top:0; font-size: 1.1em; text-transform: uppercase;">Titolari</h2>
    
    <div class="pitch">
        <div class="row" id="row-1"></div>
        <div class="row" id="row-2"></div>
        <div class="row" id="row-3"></div>
    </div>

    <div class="reserves-container">
        <span class="reserves-label">Riserve</span>
        <div class="row" id="row-reserves"></div>
    </div>

    <div id="spin-section">
        <div style="font-size: 12px; color: gold;">🎡 Hai <span id="spin-available">0</span> girate disponibili!</div>
        <button id="spin-btn" onclick="spinWheel()">GIRA ORA</button>
    </div>

    <button class="close-btn" onclick="toggleSquad()">TORNA AL CAMPO</button>
</div>

<div id="navbar">
    <div id="nav-campo" class="nav-item active" onclick="showGame()">🏟️<br>CAMPO</div>
    <div id="nav-squadra" class="nav-item" onclick="toggleSquad()">
        <span id="spin-badge" class="badge">0</span>
        🏃<br>SQUADRA
    </div>
    <div class="nav-item" style="opacity:0.3">💰<br>SHOP</div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    // Carichiamo anche 'spins' dal salvataggio locale
    let taps = parseInt(localStorage.getItem('taps')) || 0;
    let players = JSON.parse(localStorage.getItem('players')) || [];
    let spins = parseInt(localStorage.getItem('spins')) || 0;

    function updateUI() {
        document.getElementById('tap-count').innerText = taps;
        
        // Calcolo progresso barra
        let progress = taps % 100;
        document.getElementById('spin-points').innerText = progress + "/100";

        // Se arriviamo a 100, aggiungiamo una girata e resettiamo il progresso visivo
        if (progress === 0 && taps > 0) {
            // Questo controllo serve per non aggiungere giri infiniti se si resta fermi a 100
            // In un gioco reale useremmo una logica più complessa, qui simuliamo il passaggio
        }

        // Gestione Badge sulla Navbar
        const badge = document.getElementById('spin-badge');
        if (spins > 0 && players.length < 8) {
            badge.innerText = spins;
            badge.style.display = "block";
        } else {
            badge.style.display = "none";
        }

        // Aggiornamento testo nel campo
        if (players.length >= 8) {
            document.getElementById('hint-text').innerText = "Squadra al completo! 🏆";
        } else {
            document.getElementById('hint-text').innerText = "Tappa per caricare la ruota!";
        }
    }

    function doTap() {
        taps++;
        
        // Ogni 100 tap precisi, guadagni una girata
        if (taps % 100 === 0) {
            spins++;
            localStorage.setItem('spins', spins);
            if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
        }

        localStorage.setItem('taps', taps);
        if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        updateUI();
    }

    function resetGame() {
        if(confirm("Resettare tutto?")) {
            taps = 0; players = []; spins = 0;
            localStorage.clear();
            updateUI();
            location.reload();
        }
    }

    function spinWheel() {
        if (spins <= 0) return;
        if (players.length >= 8) {
            alert("Squadra piena!");
            return;
        }

        spins--;
        localStorage.setItem('spins', spins);

        const rand = Math.random() * 100;
        let lv = 1;
        if (rand < 0.5) lv = 5; else if (rand < 3) lv = 4; else if (rand < 10) lv = 3; else if (rand < 35) lv = 2;
        
        const names = ["Panchina", "Mediano", "Regista", "Bomber", "CAMPIONE"];
        players.push({ name: names[lv-1], level: lv });
        localStorage.setItem('players', JSON.stringify(players));
        
        alert("🎉 TROVATO: " + names[lv-1]);
        renderSquad(); // Aggiorna la vista della squadra
        updateUI();
    }

    function toggleSquad() {
        const screen = document.getElementById('squad-screen');
        const opening = screen.style.display !== 'block';
        screen.style.display = opening ? 'block' : 'none';
        document.getElementById('nav-campo').classList.toggle('active', !opening);
        document.getElementById('nav-squadra').classList.toggle('active', opening);
        if (opening) renderSquad();
    }

    function showGame() {
        document.getElementById('squad-screen').style.display = 'none';
        document.getElementById('nav-campo').classList.add('active');
        document.getElementById('nav-squadra').classList.remove('active');
        updateUI();
    }

    function renderSquad() {
        const rows = { r1: document.getElementById('row-1'), r2: document.getElementById('row-2'), r3: document.getElementById('row-3'), rr: document.getElementById('row-reserves') };
        Object.values(rows).forEach(r => r.innerHTML = "");

        players.forEach((p, i) => {
            let slot = `<div class="player-slot lvl-${p.level}"><strong>${p.name}</strong><br>LVL ${p.level}</div>`;
            if (i === 0) rows.r1.innerHTML = slot;
            else if (i < 3) rows.r2.innerHTML += slot;
            else if (i < 5) rows.r3.innerHTML += slot;
            else if (i < 8) rows.rr.innerHTML += slot;
        });

        // Riempimento posti vuoti
        if (!rows.r1.innerHTML) rows.r1.innerHTML = '<div class="player-slot" style="opacity:0.2">VUOTO</div>';
        while (rows.r2.children.length < 2) rows.r2.innerHTML += '<div class="player-slot" style="opacity:0.2">VUOTO</div>';
        while (rows.r3.children.length < 2) rows.r3.innerHTML += '<div class="player-slot" style="opacity:0.2">VUOTO</div>';
        while (rows.rr.children.length < 3) rows.rr.innerHTML += '<div class="player-slot" style="opacity:0.2">VUOTO</div>';

        // Mostra/Nascondi sezione ruota
        const spinSection = document.getElementById('spin-section');
        if (spins > 0 && players.length < 8) {
            spinSection.style.display = "block";
            document.getElementById('spin-available').innerText = spins;
        } else {
            spinSection.style.display = "none";
        }
    }

    updateUI();
</script>
</body>
</html>
