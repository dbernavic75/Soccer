<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Soccer Stars - Elite Manager</title>
    <style>
        :root {
            --gold: #ffd700;
            --rarity-1: #95a5a6; --rarity-2: #2ecc71; --rarity-3: #3498db; --rarity-4: #9b59b6; --rarity-5: #f1c40f;
        }
        body { margin: 0; background: #1a472a; color: white; font-family: 'Arial Black', sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* HEADER FISSO OVUNQUE */
        #header { padding: 8px; background: #000; border-bottom: 2px solid var(--gold); display: flex; justify-content: space-between; align-items: center; z-index: 2000; position: sticky; top: 0; }
        .header-stat { text-align: center; flex: 1; }
        .stat-val { font-size: 18px; color: var(--gold); display: block; }
        .stat-lab { font-size: 8px; text-transform: uppercase; color: #aaa; }
        #reset-btn { background: #ff4444; border: none; color: white; padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; cursor: pointer; }

        #main-container { flex: 1; position: relative; overflow: hidden; }
        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; overflow-y: auto; padding-bottom: 100px; box-sizing: border-box; }
        #game-area { display: flex; align-items: center; justify-content: center; background: radial-gradient(circle, #2e7d32 0%, #1a472a 100%); }
        #ball { width: 140px; cursor: pointer; transition: 0.1s; -webkit-tap-highlight-color: transparent; }
        #ball:active { transform: scale(0.8); }

        /* SQUADRA */
        #squad-screen { background: #0f2b1a; padding: 5px; }
        .section-title { text-align: center; color: var(--gold); font-size: 10px; margin: 10px 0 5px 0; border-bottom: 1px solid rgba(255,215,0,0.3); }
        .row { display: flex; justify-content: center; gap: 5px; margin-bottom: 5px; min-height: 120px; }
        
        .player-slot { width: 80px; height: 120px; border-radius: 6px; position: relative; background: #222; border: 2px solid #333; overflow: hidden; display: flex; flex-direction: column; cursor: pointer; }
        .empty-label { margin: auto; font-size: 8px; color: #555; text-align: center; text-transform: uppercase; }
        .card-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center; opacity: 0.6; z-index: 1; }
        .card-overlay { position: absolute; bottom: 0; left: 0; width: 100%; height: 60%; background: linear-gradient(to top, black 20%, transparent 100%); z-index: 2; }
        .card-header { position: absolute; top: 2px; width: 100%; display: flex; justify-content: space-between; padding: 0 4px; z-index: 3; box-sizing: border-box; }
        .tag-lvl { background: rgba(0,0,0,0.8); color: white; padding: 1px 3px; border-radius: 2px; font-size: 7px; }
        .tag-upg { background: var(--gold); color: black; padding: 1px 3px; border-radius: 2px; font-size: 7px; font-weight: bold; }
        .card-info { position: absolute; bottom: 4px; width: 100%; text-align: center; z-index: 3; }
        .card-pwr { font-size: 14px; color: var(--gold); display: block; line-height: 1; }
        .card-name { font-size: 6px; text-transform: uppercase; color: #fff; white-space: nowrap; }

        /* MODALITÀ PARTITA */
        #match-screen { background: #0a1f13; padding: 20px; text-align: center; }
        .match-card { background: #111; border: 2px solid var(--gold); border-radius: 15px; padding: 20px; margin-top: 20px; }
        #match-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 3000; flex-direction: column; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; }
        #match-log { background: #111; width: 100%; height: 200px; overflow-y: hidden; border: 1px solid #333; padding: 10px; font-family: monospace; color: #0f0; margin: 15px 0; border-radius: 8px; font-size: 13px; }

        /* UI GENERALE */
        .btn-ui { border: none; font-weight: bold; border-radius: 8px; padding: 12px; cursor: pointer; width: 100%; margin-top: 10px; font-family: 'Arial Black', sans-serif; text-transform: uppercase; }
        .btn-ui:disabled { background: #444 !important; color: #888; }
        #navbar { display: flex; background: #000; padding: 12px 0; border-top: 2px solid var(--gold); position: fixed; bottom: 0; width: 100%; z-index: 1000; }
        .nav-item { flex: 1; text-align: center; font-size: 11px; color: #666; cursor: pointer; }
        .nav-item.active { color: var(--gold); }

        /* ANIMAZIONI E MODALI */
        #pack-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 5000; align-items: center; justify-content: center; flex-direction: column; }
        .anim-card { width: 140px; height: 210px; border: 6px solid white; border-radius: 12px; background: #222; display: flex; align-items: center; justify-content: center; overflow: hidden; font-size: 60px; }
        .spinning { animation: rotate 0.2s infinite linear; }
        @keyframes rotate { 0% { transform: rotateY(0deg); } 100% { transform: rotateY(360deg); } }
        .vibrating { animation: vib 0.2s infinite; }
        @keyframes vib { 0% { transform: translate(0); } 50% { transform: translate(1px, 1px); } 100% { transform: translate(0); } }
    </style>
</head>
<body>

<div id="header">
    <button id="reset-btn" onclick="resetGame()">RESET</button>
    <div class="header-stat"><span class="stat-lab">I tuoi Tap</span><span id="tap-count" class="stat-val">0</span></div>
</div>

<div id="main-container">
    <div id="game-area" class="screen" style="display: flex;">
        <img src="https://upload.wikimedia.org/wikipedia/commons/d/d3/Soccerball.svg" id="ball" onclick="doTap()">
    </div>

    <div id="squad-screen" class="screen">
        <div id="shop-area" style="text-align: center;"></div>
        <div class="section-title">TITOLARI</div>
        <div id="row-pt" class="row"></div>
        <div id="row-df" class="row"></div>
        <div id="row-at" class="row"></div>
        <div class="section-title">RISERVE</div>
        <div id="row-res" class="row"></div>
        <button id="sub-mode-btn" class="btn-ui" style="background: #3498db; color: white; display: none;" onclick="toggleSubMode()">MODALITÀ SOSTITUZIONE</button>
    </div>

    <div id="match-screen" class="screen">
        <h2 style="color: var(--gold); text-align: center;">STADIO ELITE</h2>
        <div class="match-card">
            <p style="font-size: 12px; color: #aaa;">SFIDA DELLA SETTIMANA</p>
            <h1 id="opp-name">---</h1>
            <p id="opp-power">Potenza: ---</p>
            <p id="match-reward">Premio: --- Tap</p>
            <button id="start-match-btn" class="btn-ui" style="background: var(--gold); color: #000;" onclick="startMatch()">GIOCA ORA</button>
            <p id="match-error" style="color: #ff4444; font-size: 10px; margin-top: 10px;"></p>
        </div>
    </div>
</div>

<div id="pack-overlay">
    <div id="anim-card" class="anim-card">?</div>
    <h2 id="pack-res" style="color:white; margin-top:15px;"></h2>
    <div id="pack-cat" style="height:20px;"></div>
    <button class="btn-ui" id="close-pack" onclick="finishPack()" style="display:none; background:var(--gold); width: 200px;">OK</button>
</div>

<div id="match-modal">
    <h2 id="match-title" style="color:var(--gold)">PARTITA IN CORSO</h2>
    <div style="font-size: 40px; margin: 10px 0;">
        <span id="score-h">0</span> - <span id="score-a">0</span>
    </div>
    <div id="match-log"></div>
    <button id="end-match-btn" class="btn-ui" style="display:none; background:white; color:#000;" onclick="closeMatch()">RITORNA ALLO STADIO</button>
</div>

<div id="navbar">
    <div class="nav-item active" id="nav-game" onclick="nav('game')">CAMPO</div>
    <div class="nav-item" id="nav-squad" onclick="nav('squad')">SQUADRA</div>
    <div class="nav-item" id="nav-match" onclick="nav('match')">STADIO</div>
</div>

<script>
    const SAVE_KEY = "soccer_stars_v50";
    const DB_REAL = {
        5: ["Lio Messi", "Cristiano Ronalda", "Van Bastone", "Mattonaus", "George Bestia"],
        4: ["Kylian Mbappé", "Erling Haaland", "Luka Modric", "Benzemulo", "Neymar Jr"],
        3: ["Ciro Immobile", "Gigio Paperumma", "Theo Ernannde", "Dusan Vlahovic", "Nicolò Barellino"]
    };
    const COLORS = ["", "#95a5a6", "#2ecc71", "#3498db", "#9b59b6", "#f1c40f"];
    const BASE_PWR = [0, 40, 60, 90, 150, 250];

    let taps = 2000000;
    let squad = { pt: [], df: [], at: [], res_pt: null, res_df: null, res_at: null };
    let isSubMode = false;
    let currentOpponent = null;

    // --- LOGICA CORE ---
    function init() {
        let saved = localStorage.getItem(SAVE_KEY);
        if(saved) {
            let data = JSON.parse(saved);
            taps = data.taps || 2000000;
            squad = data.squad;
        }
        updateUI();
        genOpponent();
    }

    function save() { localStorage.setItem(SAVE_KEY, JSON.stringify({taps, squad})); }
    function doTap() { taps++; updateUI(); save(); }
    function updateUI() { document.getElementById('tap-count').innerText = taps.toLocaleString(); }

    function nav(id) {
        document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id + '-screen').style.display = (id === 'game') ? 'flex' : 'block';
        document.getElementById('nav-' + id).classList.add('active');
        if(id === 'squad') renderSquad();
        if(id === 'match') checkRequirements();
    }

    function calcPower(p) { return BASE_PWR[p.level] + (p.upgrades * p.level * 2); }

    // --- GESTIONE SQUADRA ---
    function renderSquad() {
        const isFull = (squad.pt.length >= 1 && squad.df.length >= 2 && squad.at.length >= 2 && squad.res_pt && squad.res_df && squad.res_at);
        const draw = (p, roleKey, idx, def) => {
            if(!p) return `<div class="player-slot"><div class="empty-label">${def}</div></div>`;
            let pwr = calcPower(p);
            return `<div class="player-slot" style="border-color:${COLORS[p.level]}" onclick="handleCard('${roleKey}', ${idx})">
                <div class="card-bg" style="background-image:url('https://api.dicebear.com/7.x/avataaars/svg?seed=${p.name}')"></div>
                <div class="card-header"><span class="tag-lvl">LV ${p.level}</span><span class="tag-upg">${p.upgrades}</span></div>
                <div class="card-info"><span class="card-pwr">${pwr}</span><span class="card-name">${p.name}</span></div>
            </div>`;
        };
        document.getElementById('row-pt').innerHTML = draw(squad.pt[0], 'pt', 0, 'PT');
        document.getElementById('row-df').innerHTML = draw(squad.df[0], 'df', 0, 'DF') + draw(squad.df[1], 'df', 1, 'DF');
        document.getElementById('row-at').innerHTML = draw(squad.at[0], 'at', 0, 'AT') + draw(squad.at[1], 'at', 1, 'AT');
        document.getElementById('row-res').innerHTML = draw(squad.res_pt, 'res_pt', null, 'RIS PT') + draw(squad.res_df, 'res_df', null, 'RIS DF') + draw(squad.res_at, 'res_at', null, 'RIS AT');
        
        document.getElementById('shop-area').innerHTML = `<button class="btn-ui" onclick="buyPack()" style="background:var(--gold); margin-bottom:15px; width:280px;" ${taps<300||isFull?'disabled':''}>${isFull?'SQUADRA COMPLETA':'PACCHETTO (300 TAP)'}</button>`;
        document.getElementById('sub-mode-btn').style.display = isFull ? "block" : "none";
    }

    function buyPack() {
        if(taps < 300) return;
        taps -= 300; updateUI();
        const ov = document.getElementById('pack-overlay');
        ov.style.display = 'flex';
        document.getElementById('anim-card').classList.add('spinning');
        
        setTimeout(() => {
            document.getElementById('anim-card').classList.remove('spinning');
            let lv = Math.random() < 0.05 ? 5 : Math.random() < 0.15 ? 4 : 3;
            let name = DB_REAL[lv][Math.floor(Math.random()*DB_REAL[lv].length)];
            
            // Doppione
            let all = [...squad.pt, ...squad.df, ...squad.at, squad.res_pt, squad.res_df, squad.res_at].filter(x=>x);
            if(all.some(x => x.name === name)) {
                document.getElementById('anim-card').innerHTML = "❌";
                document.getElementById('pack-res').innerText = "DOPPIONE!";
            } else {
                let role = ['pt','df','at'][Math.floor(Math.random()*3)];
                let p = {name, level:lv, upgrades:0, role};
                let ok = false;
                if(squad[role].length < (role==='pt'?1:2)) { squad[role].push(p); ok = true; }
                else if(!squad['res_'+role]) { squad['res_'+role] = p; ok = true; }
                
                if(ok) {
                    document.getElementById('anim-card').innerHTML = `<img src="https://api.dicebear.com/7.x/avataaars/svg?seed=${name}" width="100%">`;
                    document.getElementById('pack-res').innerText = name.toUpperCase();
                } else {
                    document.getElementById('pack-res').innerText = "POSTI PIENI!";
                }
            }
            document.getElementById('close-pack').style.display = "block";
            save();
        }, 1000);
    }

    // --- LOGICA PARTITA ---
    function genOpponent() {
        const names = ["Scappati di Casa", "Real Madrido", "Crotone Cotto", "AC Picchia", "Pescara Manzia"];
        let pwr = 300 + Math.floor(Math.random() * 1500);
        currentOpponent = { name: names[Math.floor(Math.random()*names.length)], power: pwr, reward: Math.floor(pwr * 4) };
        document.getElementById('opp-name').innerText = currentOpponent.name;
        document.getElementById('opp-power').innerText = "Potenza: " + pwr;
        document.getElementById('match-reward').innerText = "Premio: " + currentOpponent.reward + " Tap";
    }

    function checkRequirements() {
        const isReady = (squad.pt.length >= 1 && squad.df.length >= 2 && squad.at.length >= 2);
        document.getElementById('start-match-btn').disabled = !isReady;
        document.getElementById('match-error').innerText = isReady ? "" : "Completa i 5 titolari per giocare!";
    }

    function startMatch() {
        document.getElementById('match-modal').style.display = 'flex';
        let log = document.getElementById('match-log');
        let myPwr = [...squad.pt, ...squad.df, ...squad.at].reduce((a, b) => a + calcPower(b), 0);
        let hS = 0, aS = 0, step = 0;
        log.innerHTML = "FISCHIO D'INIZIO!<br>";

        let inv = setInterval(() => {
            step++;
            let r = Math.random();
            if(r < 0.2) {
                if(Math.random() * myPwr > Math.random() * currentOpponent.power) {
                    hS++; log.innerHTML += "GOOOAL! I tuoi segnano!<br>";
                } else {
                    aS++; log.innerHTML += "GOL dell'avversario...<br>";
                }
                document.getElementById('score-h').innerText = hS;
                document.getElementById('score-a').innerText = aS;
            } else {
                log.innerHTML += "Azione a centrocampo...<br>";
            }
            log.scrollTop = log.scrollHeight;

            if(step >= 10) {
                clearInterval(inv);
                log.innerHTML += "--- FINE PARTITA ---<br>";
                if(hS > aS) {
                    log.innerHTML += `<b style="color:gold">VITTORIA! +${currentOpponent.reward} Tap</b>`;
                    taps += currentOpponent.reward;
                } else if (hS < aS) {
                    log.innerHTML += `<b style="color:red">SCONFITTA. Ritenta!</b>`;
                } else {
                    log.innerHTML += `<b>PAREGGIO! +${Math.floor(currentOpponent.reward/3)} Tap</b>`;
                    taps += Math.floor(currentOpponent.reward/3);
                }
                document.getElementById('end-match-btn').style.display = "block";
                updateUI(); save(); genOpponent();
            }
        }, 600);
    }

    // --- UTILS ---
    function finishPack() { document.getElementById('pack-overlay').style.display = 'none'; document.getElementById('close-pack').style.display='none'; renderSquad(); }
    function closeMatch() { 
        document.getElementById('match-modal').style.display = 'none'; 
        document.getElementById('end-match-btn').style.display='none';
        document.getElementById('score-h').innerText = 0;
        document.getElementById('score-a').innerText = 0;
    }
    function resetGame() { if(confirm("Resetti tutto?")) { localStorage.clear(); location.reload(); } }

    window.onload = init;
</script>
</body>
</html>
