<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Soccer Stars - Pro Manager</title>
    <style>
        :root { --gold: #ffd700; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { font-family: 'Arial Black', sans-serif; background: #000; color: white; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        #header { height: 60px; background: #111; border-bottom: 2px solid var(--gold); display: flex; justify-content: space-between; align-items: center; padding: 0 15px; z-index: 2000; }
        .stat-val { font-size: 18px; color: var(--gold); }
        #main-content { flex-grow: 1; position: relative; }
        .screen { display: none; width: 100%; height: 100%; padding: 15px; overflow-y: auto; padding-bottom: 100px; }
        #scr-campo { display: flex; align-items: center; justify-content: center; background: radial-gradient(circle, #2e7d32 0%, #1a472a 100%); }
        #ball { width: 160px; cursor: pointer; transition: transform 0.1s; z-index: 100; position: relative; }
        #ball:active { transform: scale(0.85); }
        .card { width: 75px; height: 115px; border-radius: 6px; background: #222; border: 2px solid #333; position: relative; display: flex; flex-direction: column; cursor: pointer; }
        .row { display: flex; justify-content: center; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
        #nav { height: 70px; background: #111; border-top: 2px solid var(--gold); display: flex; justify-content: space-around; align-items: center; z-index: 2000; }
        .nav-item { flex: 1; text-align: center; color: #555; font-size: 12px; cursor: pointer; padding: 20px 0; }
        .nav-item.active { color: var(--gold); font-weight: bold; }
        .btn-ui { background: var(--gold); color: black; border: none; padding: 12px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; margin: 10px 0; }
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index: 4000; align-items:center; justify-content:center; }
        .modal-box { background: white; color: black; border-radius: 15px; padding: 20px; width: 90%; max-width: 320px; }
        .bar-bg { flex: 1; height: 10px; background: #eee; border-radius: 5px; margin: 0 8px; overflow: hidden; }
        .bar-fill { height: 100%; background: #3498db; }
    </style>
</head>
<body>

<div id="header">
    <div><span style="font-size:8px; color:#aaa; display:block;">BILANCIO</span><span id="display-taps" class="stat-val">0</span></div>
    <button onclick="clearAll()" style="background:red; color:white; border:none; padding:8px; border-radius:5px; font-size:10px;">RESET TOTALE</button>
</div>

<div id="main-content">
    <div id="scr-campo" class="screen" style="display: flex;">
        <img src="https://upload.wikimedia.org/wikipedia/commons/d/d3/Soccerball.svg" id="ball" onclick="doTap()">
    </div>
    <div id="scr-squadra" class="screen">
        <button class="btn-ui" onclick="openPack()">APRI PACCHETTO (500 TAP)</button>
        <div id="row-at" class="row"></div>
        <div id="row-df" class="row"></div>
        <div id="row-pt" class="row"></div>
    </div>
    <div id="scr-stadio" class="screen">
        <h2 style="text-align:center; color:var(--gold);">STADIO</h2>
        <div id="match-ui" style="background:#222; padding:20px; border-radius:15px; margin-top:20px; text-align:center;">
            <h1 id="opp-name">---</h1>
            <button class="btn-ui" onclick="startMatch()">GIOCA PARTITA</button>
        </div>
    </div>
</div>

<div id="modal-detail" class="modal">
    <div class="modal-box">
        <h2 id="m-name" style="text-align:center;"></h2>
        <div id="m-stats"></div>
        <button id="m-upg" class="btn-ui"></button>
        <button onclick="closeModal()" class="btn-ui" style="background:#eee;">CHIUDI</button>
    </div>
</div>

<div id="nav">
    <div class="nav-item active" onclick="move('campo', this)">CAMPO</div>
    <div class="nav-item" onclick="move('squadra', this)">SQUADRA</div>
    <div class="nav-item" onclick="move('stadio', this)">STADIO</div>
</div>

<script>
    const DB = {
        5: ["Messi", "Ronaldo", "Zidane", "Pelé", "Maradona"],
        4: ["Mbappé", "Haaland", "Modric", "De Bruyne", "Neymar"],
        3: ["Lautaro", "Donnarumma", "Theo", "Barella", "Leao"],
        2: ["Graziani", "Inzaghi", "Sabatini", "Vieri", "Totti"],
        1: ["Palo", "Traversa", "Cross", "Angolo", "Rinvio"]
    };

    let taps = localStorage.getItem('game_taps') ? parseInt(localStorage.getItem('game_taps')) : 2000000;
    let squad = JSON.parse(localStorage.getItem('game_squad')) || { pt:[], df:[], at:[], res_pt:null, res_df:null, res_at:null };

    function save() {
        localStorage.setItem('game_taps', taps);
        localStorage.setItem('game_squad', JSON.stringify(squad));
    }

    function refresh() {
        document.getElementById('display-taps').innerText = taps.toLocaleString('it-IT');
    }

    function doTap() {
        taps++;
        refresh();
        save();
    }

    function move(id, el) {
        document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('scr-' + id).style.display = (id === 'campo' ? 'flex' : 'block');
        el.classList.add('active');
        if(id === 'squadra') renderSquad();
    }

    function getStats(p) {
        let baseVal = 50 + (p.level * 20) + (p.upgrades * 5);
        if (!p.special) {
            const keys = ['vel', 'tir', 'dif', 'pas', 'fis'];
            p.special = keys.sort(() => 0.5 - Math.random()).slice(0, 2);
        }
        let s = {};
        ['vel', 'tir', 'dif', 'pas', 'fis'].forEach(k => {
            s[k] = p.special.includes(k) ? Math.floor(baseVal * 1.2) : Math.floor(baseVal * 0.85);
        });
        s.total = s.vel + s.tir + s.dif + s.pas + s.fis;
        return s;
    }

    function renderSquad() {
        const draw = (p, role) => {
            if(!p) return `<div class="card" style="opacity:0.3; justify-content:center; align-items:center;">${role}</div>`;
            let s = getStats(p);
            return `<div class="card" onclick="openModal('${role}')" style="border-color:gold">
                <div style="font-size:10px; text-align:center; margin-top:5px;">${p.name}</div>
                <div style="font-size:18px; text-align:center; color:gold; margin-top:10px;">${s.total}</div>
            </div>`;
        };
        document.getElementById('row-pt').innerHTML = draw(squad.pt[0], 'pt');
        document.getElementById('row-df').innerHTML = draw(squad.df[0], 'df') + draw(squad.df[1], 'df');
        document.getElementById('row-at').innerHTML = draw(squad.at[0], 'at') + draw(squad.at[1], 'at');
    }

    function openModal(role) {
        let p = squad[role][0] || squad[role];
        if(!p) return;
        document.getElementById('modal-detail').style.display = 'flex';
        document.getElementById('m-name').innerText = p.name;
        let s = getStats(p);
        let html = "";
        ['vel', 'tir', 'dif', 'pas', 'fis'].forEach(k => {
            let isSpecial = p.special.includes(k);
            html += `<div style="display:flex; align-items:center; margin:5px 0; font-size:12px;">
                <span style="width:70px; ${isSpecial?'color:green;font-weight:bold':''}">${k.toUpperCase()}</span>
                <div class="bar-bg"><div class="bar-fill" style="width:${s[k]/3}%"></div></div>
                <span>${s[k]}</span>
            </div>`;
        });
        document.getElementById('m-stats').innerHTML = html;
        let cost = 1000 * (p.upgrades + 1);
        document.getElementById('m-upg').innerText = `POTENZIA (${cost})`;
        document.getElementById('m-upg').onclick = () => {
            if(taps >= cost) { taps -= cost; p.upgrades++; save(); refresh(); openModal(role); }
        };
    }

    function openPack() {
        if(taps < 500) return alert("Tap insufficienti!");
        taps -= 500;
        let lv = Math.floor(Math.random() * 5) + 1;
        let name = DB[lv][Math.floor(Math.random() * 5)];
        let roles = ['pt', 'df', 'at'];
        let r = roles[Math.floor(Math.random() * 3)];
        let p = { name, level: lv, upgrades: 0, role: r };
        if(r === 'pt') squad.pt[0] = p;
        else if(squad[r].length < 2) squad[r].push(p);
        else squad[r][0] = p;
        save(); refresh(); renderSquad();
        alert("Hai trovato: " + name);
    }

    function closeModal() { document.getElementById('modal-detail').style.display = 'none'; }
    function clearAll() { localStorage.clear(); location.reload(); }
    window.onload = () => { refresh(); move('campo', document.querySelector('.nav-item')); };
</script>
</body>
</html>
