<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Soccer Stars - Final Fix</title>
    <style>
        :root {
            --gold: #ffd700;
            --rarity-1: #95a5a6; --rarity-2: #2ecc71; --rarity-3: #3498db; --rarity-4: #9b59b6; --rarity-5: #f1c40f;
        }
        body { margin: 0; background: #1a472a; color: white; font-family: 'Arial Black', sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        #header { padding: 8px; background: #000; border-bottom: 2px solid var(--gold); display: flex; justify-content: space-between; align-items: center; z-index: 5; }
        .header-stat { text-align: center; flex: 1; }
        .stat-val { font-size: 18px; color: var(--gold); display: block; }
        .stat-lab { font-size: 8px; text-transform: uppercase; color: #aaa; }
        #reset-btn { background: #ff4444; border: none; color: white; padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; cursor: pointer; }

        #game-area { flex: 1; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle, #2e7d32 0%, #1a472a 100%); }
        #ball { width: 120px; cursor: pointer; transition: 0.1s; -webkit-tap-highlight-color: transparent; }
        #ball:active { transform: scale(0.8); }

        #pack-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 100; align-items: center; justify-content: center; flex-direction: column; }
        .anim-card { width: 140px; height: 210px; border: 6px solid white; border-radius: 12px; background: #222; display: flex; align-items: center; justify-content: center; overflow: hidden; font-size: 80px; }
        .spinning { animation: spin 0.2s infinite linear, colorShift 0.2s infinite linear; }
        @keyframes spin { 0% { transform: rotateY(0deg); } 100% { transform: rotateY(360deg); } }
        @keyframes colorShift {
            0% { border-color: var(--rarity-1); } 25% { border-color: var(--rarity-2); }
            50% { border-color: var(--rarity-3); } 75% { border-color: var(--rarity-4); }
            100% { border-color: var(--rarity-5); }
        }

        #squad-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0f2b1a; z-index: 10; padding: 5px; box-sizing: border-box; overflow-y: auto; padding-bottom: 80px; }
        .section-title { text-align: center; color: var(--gold); font-size: 10px; margin: 10px 0 5px 0; border-bottom: 1px solid rgba(255,215,0,0.3); }
        .row { display: flex; justify-content: center; gap: 5px; margin-bottom: 5px; min-height: 120px; }
        
        .player-slot { width: 80px; height: 120px; border-radius: 6px; position: relative; background: #222; border: 2px solid #333; overflow: hidden; display: flex; flex-direction: column; cursor: pointer; }
        .empty-label { margin: auto; font-size: 8px; color: #555; text-align: center; text-transform: uppercase; }
        
        .card-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center; opacity: 0.6; z-index: 1; }
        .card-overlay { position: absolute; bottom: 0; left: 0; width: 100%; height: 60%; background: linear-gradient(to top, black 20%, transparent 100%); z-index: 2; }
        .card-header { position: absolute; top: 2px; width: 100%; display: flex; justify-content: space-between; padding: 0 4px; z-index: 3; box-sizing: border-box; }
        .tag-lvl { background: rgba(0,0,0,0.8); color: white; padding: 1px 3px; border-radius: 2px; font-size: 7px; }
        .tag-upg { background: var(--gold); color: black; padding: 1px 3px; border-radius: 2px; font-size: 7px; font-weight: bold; }
        
        .card-info { position: absolute; bottom: 4px; width: 100%; text-align: center; z-index: 3; }
        .card-role-tag { font-size: 6px; color: #aaa; text-transform: uppercase; display: block; }
        .card-pwr { font-size: 14px; color: var(--gold); display: block; line-height: 1; }
        .card-name { font-size: 6px; text-transform: uppercase; color: #fff; white-space: nowrap; }

        #details-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 25; padding: 20px; box-sizing: border-box; align-items: center; justify-content: center; }
        .modal-content { background: #fff; color: #000; border-radius: 15px; padding: 20px; width: 100%; max-width: 300px; position: relative; }
        
        .btn-ui { border: none; font-weight: bold; border-radius: 8px; padding: 12px; cursor: pointer; width: 100%; margin-top: 10px; font-family: 'Arial Black', sans-serif; }
        
        #navbar { display: flex; background: #000; padding: 10px 0; border-top: 2px solid var(--gold); position: fixed; bottom: 0; width: 100%; z-index: 20; }
        .nav-item { flex: 1; text-align: center; font-size: 11px; color: #666; cursor: pointer; }
        .nav-item.active { color: var(--gold); }
        
        @keyframes vibrate { 0% { transform: translate(0); } 25% { transform: translate(1px, 1px); } 50% { transform: translate(-1px, -1px); } 100% { transform: translate(0); } }
        .vibrating { animation: vibrate 0.2s infinite; border: 2px solid white !important; }
        .target-sub { animation: vibrate 0.1s infinite; border: 2px solid var(--gold) !important; box-shadow: 0 0 15px var(--gold); }
    </style>
</head>
<body>

<div id="header">
    <button id="reset-btn" onclick="resetGame()">RESET</button>
    <div class="header-stat"><span class="stat-lab">I tuoi Tap</span><span id="tap-count" class="stat-val">0</span></div>
</div>

<div id="game-area">
    <img src="https://upload.wikimedia.org/wikipedia/commons/d/d3/Soccerball.svg" id="ball" onclick="doTap()">
</div>

<div id="squad-screen">
    <div id="shop-area" style="text-align: center;"></div>
    <div class="section-title">TITOLARI</div>
    <div class="row" id="row-pt"></div>
    <div class="row" id="row-df"></div>
    <div class="row" id="row-at"></div>
    <div class="section-title">RISERVE</div>
    <div class="row" id="row-res"></div>
    <button id="sub-mode-btn" class="btn-ui" style="background: #3498db; color: white; display: none;" onclick="toggleSubMode()">MODALITÀ SOSTITUZIONE</button>
</div>

<div id="pack-overlay">
    <div id="anim-card" class="anim-card">?</div>
    <h2 id="pack-res" style="margin-top:15px; text-align:center;"></h2>
    <div id="pack-cat" style="height: 20px; font-size: 14px; text-align: center;"></div>
    <button class="btn-ui" id="close-pack" onclick="finishPack()" style="display:none; background:var(--gold); width: auto; padding: 10px 40px;">OK</button>
</div>

<div id="details-modal">
    <div class="modal-content">
        <button onclick="closeDetails()" style="position:absolute; right:10px; top:10px; background:none; border:none; font-size:24px;">×</button>
        <div id="m-role" style="font-size:9px; color:#666; text-align:center; text-transform:uppercase;"></div>
        <div id="m-category" style="font-size:10px; text-align:center; font-weight:bold;"></div>
        <img id="m-img" src="" style="width:80px; margin:10px auto; display:block;">
        <h2 id="m-name" style="text-align:center; margin:5px 0; font-size:18px;"></h2>
        <div id="stats-container" style="font-size: 11px; color: #333;"></div>
        <div id="m-total" style="text-align:center; font-size:20px; margin:10px 0; font-weight:bold;"></div>
        <button id="upg-action-btn" class="btn-ui" style="background:#1a472a; color:white;"></button>
    </div>
</div>

<div id="navbar">
    <div class="nav-item active" id="nav-campo" onclick="showGame()">CAMPO</div>
    <div class="nav-item" id="nav-squadra" onclick="toggleSquad()">SQUADRA</div>
</div>

<script>
    // --- DATABASE FISSO ---
    const DB_MASTER = {
        5: [
            {n:"Gigio Paperonum", r:"PT"}, {n:"Manuel Neuerbo", r:"PT"},
            {n:"Paolo Maldino", r:"DF"}, {n:"Sergio Ramoscio", r:"DF"}, {n:"Virgil Van Disco", r:"DF"}, {n:"Franz Brick-enbauer", r:"DF"},
            {n:"Lio Pulce Messi", r:"AT"}, {n:"Cristiano Ronalda", r:"AT"}, {n:"Kylian Mbappappé", r:"AT"}, {n:"Erling Aland", r:"AT"}
        ],
        4: [
            {n:"Thibaut Cortese", r:"PT"}, {n:"Alisson Beckerre", r:"PT"}, {n:"Ederson Volante", r:"PT"}, {n:"Jan Oblacco", r:"PT"}, {n:"Mike Magman", r:"PT"}, {n:"Marc Ter Stecca", r:"PT"},
            {n:"Ruben Diaspro", r:"DF"}, {n:"Achraf Volante", r:"DF"}, {n:"Theo Ernannde", r:"DF"}, {n:"Eder Militaoia", r:"DF"}, {n:"Marquinhosinho", r:"DF"}, {n:"Alphonso Runner", r:"DF"},
            {n:"Kevin De Bruyne-a", r:"AT"}, {n:"Mo Salata", r:"AT"}, {n:"Vini Juniorre", r:"AT"}, {n:"Harry Cannone", r:"AT"}, {n:"Lautaro Toro", r:"AT"}, {n:"Robert Lewandovino", r:"AT"}
        ]
    };

    const COLORS = ["", "#95a5a6", "#2ecc71", "#3498db", "#9b59b6", "#f1c40f"];
    const CATS = ["", "ESORDIENTE", "PROMESSA", "FUORICLASSE", "CAMPIONE", "PALLONE D'ORO"];
    const LIMITS = [0, 30, 25, 20, 15, 10];
    const BASE = [0, 40, 60, 90, 150, 250];
    const VALS = [0, 2, 4, 8, 15, 30];

    // --- CARICAMENTO SICURO ---
    let taps = 2000000;
    let squad = { pt:[], df:[], at:[], res_pt:null, res_df:null, res_at:null };

    try {
        const savedTaps = localStorage.getItem('taps_v99');
        if(savedTaps !== null) taps = parseInt(savedTaps);
        
        const savedSquad = localStorage.getItem('squad_v99');
        if(savedSquad !== null) squad = JSON.parse(savedSquad);
    } catch(e) { console.error("Errore storage", e); }

    let isSubMode = false;
    let selectedSub = null;

    function save() {
        localStorage.setItem('taps_v99', taps);
        localStorage.setItem('squad_v99', JSON.stringify(squad));
    }

    function genName(lv) {
        const p = ["Beppe", "Lino", "Ciro", "Vito", "Dino", "Mimo", "Gino", "Nico", "Ugo", "Rino"];
        const s = ["Scivolone", "Palo", "Rinvio", "Tunnel", "Cross", "Frenato", "Zoppo", "Gancio", "Tacchetto", "Bomber"];
        return p[Math.floor(Math.random()*p.length)] + " " + s[Math.floor(Math.random()*s.length)];
    }

    function doTap() { taps++; updateUI(); save(); }
    function updateUI() { document.getElementById('tap-count').innerText = taps.toLocaleString(); }
    function getRoleName(r) { return r==="PT"?"Portiere":(r==="DF"?"Difensore":"Attaccante"); }

    function calcStats(p) {
        if(!p) return { total:0 };
        const b = BASE[p.level], u = p.upgrades * VALS[p.level];
        const isPT = p.role === "PT";
        let total = isPT ? (b+u)*4 : (b+u)*5;
        return { total };
    }

    function renderSquad() {
        const isFull = (squad.pt.length>=1 && squad.df.length>=2 && squad.at.length>=2 && squad.res_pt && squad.res_df && squad.res_at);
        const draw = (p, roleKey, idx, def) => {
            let state = "";
            if(isSubMode) {
                if(!selectedSub) state = "vibrating";
                else if(selectedSub.role === roleKey && selectedSub.idx === idx) state = "vibrating";
                else if(roleKey.includes(selectedSub.role)) state = "target-sub";
            }
            if(!p) return `<div class="player-slot"><div class="empty-label">${getRoleName(def)}</div></div>`;
            return `<div class="player-slot ${state}" style="border-color:${COLORS[p.level]}" onclick="handleCard('${roleKey}', ${idx})">
                <div class="card-bg" style="background-image:url('${p.img}')"></div><div class="card-overlay"></div>
                <div class="card-header"><span class="tag-lvl">LV ${p.level}</span><span class="tag-upg">${p.upgrades>=LIMITS[p.level]?'MAX':p.upgrades}</span></div>
                <div class="card-info"><span class="card-role-tag">${getRoleName(p.role)}</span><span class="card-pwr">${calcStats(p).total}</span><span class="card-name">${p.name}</span></div>
            </div>`;
        };

        document.getElementById('row-pt').innerHTML = draw(squad.pt[0], 'pt', 0, 'PT');
        document.getElementById('row-df').innerHTML = draw(squad.df[0], 'df', 0, 'DF') + draw(squad.df[1], 'df', 1, 'DF');
        document.getElementById('row-at').innerHTML = draw(squad.at[0], 'at', 0, 'AT') + draw(squad.at[1], 'at', 1, 'AT');
        document.getElementById('row-res').innerHTML = draw(squad.res_pt, 'res_pt', null, 'PT') + draw(squad.res_df, 'res_df', null, 'DF') + draw(squad.res_at, 'res_at', null, 'AT');
        document.getElementById('shop-area').innerHTML = `<button class="btn-ui" onclick="buyPack()" style="background:var(--gold); width:250px;" ${taps<300||isFull?'disabled':''}>${isFull?'SQUADRA COMPLETA':'PACCHETTO (300 TAP)'}</button>`;
        document.getElementById('sub-mode-btn').style.display = isFull ? "block" : "none";
    }

    function buyPack() {
        if(taps<300) return;
        taps-=300; updateUI();
        const ov = document.getElementById('pack-overlay');
        const anim = document.getElementById('anim-card');
        ov.style.display = 'flex';
        anim.classList.add('spinning'); anim.innerHTML = "?"; anim.style.borderColor = "white";
        document.getElementById('pack-res').innerText = ""; 
        document.getElementById('pack-cat').innerText = "ESTRAZIONE...";
        document.getElementById('close-pack').style.display = "none";

        setTimeout(() => {
            anim.classList.remove('spinning');
            let lv = Math.random()<0.02?5:Math.random()<0.08?4:Math.random()<0.2?3:Math.random()<0.5?2:1;
            let roles = [];
            if(squad.pt.length<1 || !squad.res_pt) roles.push("PT");
            if(squad.df.length<2 || !squad.res_df) roles.push("DF");
            if(squad.at.length<2 || !squad.res_at) roles.push("AT");
            
            let r = roles[Math.floor(Math.random()*roles.length)];
            let name = (lv>=4) ? DB_MASTER[lv].filter(x=>x.r===r)[0]?.n || genName(lv) : genName(lv);
            
            let p = { name, level:lv, upgrades:0, role:r, bias:Math.floor(Math.random()*10), img:`https://api.dicebear.com/7.x/avataaars/svg?seed=${name}` };
            
            let k = r.toLowerCase();
            if(squad[k].length < (k==='pt'?1:2)) squad[k].push(p); else squad['res_'+k] = p;

            anim.innerHTML = `<img src="${p.img}" width="100%">`; anim.style.borderColor = COLORS[lv];
            document.getElementById('pack-res').innerText = p.name;
            document.getElementById('pack-cat').innerText = CATS[lv];
            document.getElementById('pack-cat').style.color = COLORS[lv];
            document.getElementById('close-pack').style.display = "block";
            save(); renderSquad();
        }, 1200);
    }

    function handleCard(role, idx) {
        let p = (idx===null) ? squad[role] : squad[role][idx];
        if(!isSubMode) { if(p) openDetails(role, idx); return; }
        if(!selectedSub) { if(!role.includes('res') && p) selectedSub = {role, idx}; }
        else {
            if(role.includes(selectedSub.role)) {
                let tit = squad[selectedSub.role][selectedSub.idx];
                let ris = (idx===null)?squad[role]:squad[role][idx];
                squad[selectedSub.role][selectedSub.idx] = ris;
                if(idx===null) squad[role] = tit; else squad[role][idx] = tit;
                save(); toggleSubMode();
            } else if(!role.includes('res') && p) selectedSub = {role, idx};
        }
        renderSquad();
    }

    function openDetails(role, idx) {
        let p = (idx===null)?squad[role]:squad[role][idx];
        const cost = (p.level*2000)+(p.upgrades*800);
        document.getElementById('details-modal').style.display='flex';
        document.getElementById('m-name').innerText = p.name;
        document.getElementById('m-img').src = p.img;
        document.getElementById('m-total').innerText = "POWER: " + calcStats(p).total;
        const btn = document.getElementById('upg-action-btn');
        btn.innerText = p.upgrades>=LIMITS[p.level]?"MAX":"POTENZIA ("+cost+")";
        btn.onclick = () => { if(taps>=cost && p.upgrades<LIMITS[p.level]){ taps-=cost; p.upgrades++; save(); openDetails(role,idx); renderSquad(); updateUI(); } };
    }

    function showGame() { document.getElementById('squad-screen').style.display='none'; document.getElementById('nav-campo').classList.add('active'); document.getElementById('nav-squadra').classList.remove('active'); }
    function toggleSquad() { document.getElementById('squad-screen').style.display='block'; document.getElementById('nav-squadra').classList.add('active'); document.getElementById('nav-campo').classList.remove('active'); renderSquad(); }
    function finishPack() { document.getElementById('pack-overlay').style.display='none'; }
    function closeDetails() { document.getElementById('details-modal').style.display='none'; }
    function toggleSubMode() { isSubMode=!isSubMode; selectedSub=null; renderSquad(); }
    function resetGame() { if(confirm("RESET?")) { localStorage.clear(); location.reload(); } }

    window.onload = () => { updateUI(); renderSquad(); };
</script>
</body>
</html>
