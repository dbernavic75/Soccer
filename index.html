<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Soccer Stars Pro Manager</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { margin: 0; background: #1a472a; color: white; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Header con Reset */
        #header { padding: 10px; text-align: center; background: rgba(0,0,0,0.9); border-bottom: 1px solid #2e7d32; display: flex; justify-content: space-around; align-items: center; position: relative; z-index: 5; }
        .stat-val { font-size: 16px; font-weight: bold; display: block; color: #fff; }
        .stat-lab { font-size: 9px; color: #81c784; text-transform: uppercase; }
        #reset-btn { position: absolute; left: 10px; top: 15px; font-size: 9px; background: rgba(255,0,0,0.4); border: 1px solid red; color: white; padding: 4px 8px; border-radius: 4px; cursor: pointer; }

        #game-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #ball { width: 120px; cursor: pointer; transition: transform 0.1s; user-select: none; }
        #ball:active { transform: scale(0.9); }
        
        #navbar { display: flex; background: #000; padding: 10px 0; border-top: 1px solid #2e7d32; }
        .nav-item { flex: 1; text-align: center; font-size: 10px; color: #666; cursor: pointer; position: relative; }
        .nav-item.active { color: #4caf50; font-weight: bold; }
        .badge { position: absolute; top: -5px; right: 20%; background: red; color: white; border-radius: 50%; padding: 2px 5px; font-size: 9px; font-weight: bold; }

        /* Schermata Squadra */
        #squad-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #13331e; z-index: 10; padding: 15px; box-sizing: border-box; overflow-y: auto; }
        .row { display: flex; justify-content: center; gap: 8px; width: 100%; min-height: 85px; margin-bottom: 8px; }
        
        /* Card Giocatore */
        .player-slot { background: rgba(0,0,0,0.4); border: 2px solid #2e7d32; border-radius: 8px; width: 75px; height: 100px; display: flex; flex-direction: column; align-items: center; justify-content: space-between; padding: 5px; box-sizing: border-box; position: relative; cursor: pointer; }
        .p-role { font-size: 8px; color: #81c784; font-weight: bold; }
        .p-name { font-size: 7px; text-align: center; font-weight: bold; }
        .p-pwr { font-size: 12px; font-weight: bold; color: gold; }
        .p-upg { font-size: 7px; color: #aaa; }
        .p-lvl-tag { position: absolute; top: 2px; right: 4px; font-size: 8px; opacity: 0.7; font-weight: bold; }

        .lvl-1 { border-color: #888; } 
        .lvl-2 { border-color: #4caf50; } 
        .lvl-3 { border-color: #2196f3; box-shadow: 0 0 5px #2196f3; } 
        .lvl-4 { border-color: #a333c8; box-shadow: 0 0 8px #a333c8; } 
        .lvl-5 { border-color: #ffd700; box-shadow: 0 0 12px #ffd700; background: rgba(255,215,0,0.05); }

        /* Modal Dettagli */
        #details-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.97); z-index: 25; padding: 30px 20px; box-sizing: border-box; }
        .stat-bar-bg { background: #333; height: 8px; border-radius: 4px; margin: 4px 0 8px 0; overflow: hidden; }
        .stat-bar-fill { background: #4caf50; height: 100%; width: 0%; transition: width 0.3s; }
        .upg-btn { background: gold; color: black; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; margin-top: 20px; font-size: 14px; }
        .upg-btn:disabled { background: #555; color: #888; }
    </style>
</head>
<body>

<div id="header">
    <button id="reset-btn" onclick="resetGame()">RESET</button>
    <div><span class="stat-lab">Taps</span><span id="tap-count" class="stat-val">0</span></div>
    <div><span class="stat-lab">Giro in</span><span id="spin-points" class="stat-val">0/10</span></div>
</div>

<div id="game-area">
    <img src="https://upload.wikimedia.org/wikipedia/commons/d/d3/Soccerball.svg" id="ball" onclick="doTap()">
</div>

<div id="squad-screen">
    <div id="spin-area"></div>
    <h3 style="text-align:center; font-size:10px; color:#81c784; margin:0 0 10px 0;">TITOLARI</h3>
    <div class="row" id="row-pt"></div>
    <div class="row" id="row-df"></div>
    <div class="row" id="row-at"></div>
    
    <h3 style="text-align:center; font-size:10px; color:#81c784; margin:15px 0 10px 0;">RISERVE</h3>
    <div class="row" id="row-res"></div>
    
    <button onclick="toggleSquad()" style="width:100%; padding:12px; background:#444; color:white; border:none; border-radius:8px; margin-top:20px; font-weight:bold;">CHIUDI SQUADRA</button>
</div>

<div id="details-modal">
    <h2 id="m-name" style="margin:0; text-transform: uppercase;"></h2>
    <div id="m-role" style="color:gold; font-size:14px; margin-bottom:15px; font-weight:bold;"></div>
    <div id="stats-container"></div>
    <div style="margin-top:15px; font-size:18px; border-top: 1px solid #333; padding-top: 10px;">Potenza Totale: <span id="m-pwr" style="color:gold"></span></div>
    <div id="m-upg-text" style="margin-top:5px; color:#aaa; font-size: 13px;"></div>
    <button id="upg-action-btn" class="upg-btn"></button>
    <button onclick="closeDetails()" style="width:100%; background:transparent; color:#888; border:1px solid #444; padding:12px; margin-top:10px; border-radius:10px; font-weight:bold;">INDIETRO</button>
</div>

<div id="navbar">
    <div class="nav-item active" id="nav-campo" onclick="showGame()">🏟️<br>CAMPO</div>
    <div class="nav-item" id="nav-squadra" onclick="toggleSquad()">
        <span id="spin-badge" class="badge" style="display:none">0</span>
        🏃<br>SQUADRA
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    const RANK_NAMES = ["DILETTANTE", "PROMESSA", "TOP PLAYER", "FUORICLASSE", "PALLONE D'ORO"];
    const UPG_LIMITS = [0, 30, 20, 15, 10, 5]; 

    let taps = parseInt(localStorage.getItem('taps')) || 0;
    let spins = parseInt(localStorage.getItem('spins')) || 0;
    let squad = JSON.parse(localStorage.getItem('squad_v6')) || { pt:[], df:[], at:[], res_pt:null, res_df:null, res_at:null };
    let selectedPlayer = null;

    function doTap() {
        taps++;
        if (taps % 10 === 0) { 
            spins++; 
            localStorage.setItem('spins', spins);
            if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
        }
        localStorage.setItem('taps', taps);
        if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        updateUI();
    }

    function updateUI() {
        document.getElementById('tap-count').innerText = taps;
        document.getElementById('spin-points').innerText = (taps % 10) + "/10";
        const badge = document.getElementById('spin-badge');
        badge.style.display = spins > 0 ? "block" : "none";
        badge.innerText = spins;
    }

    function calculateStats(p) {
        let isGK = p.role.includes("PT");
        let base = p.level * 18;
        let bonus = p.upgrades * 3;
        
        let s = {
            vel: base + bonus + (p.level * 2),
            tiro: base + bonus + (p.level * (isGK ? 0.2 : 1.5)),
            pass: base + bonus + (p.level * 1.2),
            dif: base + bonus + (p.level * (isGK ? 4 : 1)),
            special: base + bonus + (p.level * 6)
        };
        s.labelSpecial = isGK ? "Riflessi" : "Dribbling";
        let total = Math.floor(s.vel + s.tiro + s.pass + s.dif + s.special);
        return { ...s, total };
    }

    function spinWheel() {
        if (spins <= 0) return;
        spins--;
        const roles = ['pt', 'df', 'at', 'res_pt', 'res_df', 'res_at'];
        const role = roles[Math.floor(Math.random() * roles.length)];
        const rand = Math.random() * 100;
        let lv = rand < 1 ? 5 : rand < 5 ? 4 : rand < 15 ? 3 : rand < 45 ? 2 : 1;
        
        const newPlayer = { level: lv, name: RANK_NAMES[lv-1], upgrades: 0, role: role.replace('res_', 'R-').toUpperCase() };
        
        let assigned = false;
        if (['pt','df','at'].includes(role)) {
            let max = role === 'pt' ? 1 : 2;
            if (squad[role].length < max) { squad[role].push(newPlayer); assigned = true; }
        } else if (!squad[role]) {
            squad[role] = newPlayer; assigned = true;
        }

        if (assigned) alert("NUOVO " + newPlayer.role + ": " + newPlayer.name);
        else alert("Slot " + role.toUpperCase() + " occupato! Giro perso.");
        
        saveAndRender();
    }

    function saveAndRender() {
        localStorage.setItem('squad_v6', JSON.stringify(squad));
        localStorage.setItem('spins', spins);
        renderSquad();
        updateUI();
    }

    function renderSquad() {
        document.getElementById('row-pt').innerHTML = draw(squad.pt[0], 'pt', 0);
        document.getElementById('row-df').innerHTML = draw(squad.df[0], 'df', 0) + draw(squad.df[1], 'df', 1);
        document.getElementById('row-at').innerHTML = draw(squad.at[0], 'at', 0) + draw(squad.at[1], 'at', 1);
        document.getElementById('row-res').innerHTML = draw(squad.res_pt, 'res_pt') + draw(squad.res_df, 'res_df') + draw(squad.res_at, 'res_at');

        document.getElementById('spin-area').innerHTML = spins > 0 ? 
            `<button onclick="spinWheel()" style="background:gold; width:100%; padding:12px; margin-bottom:15px; border-radius:8px; font-weight:bold; color:black; border:none; box-shadow:0 0 10px gold;">GIRA RUOTA (${spins})</button>` : "";
    }

    function draw(p, roleKey, index = null) {
        if (!p) return `<div class="player-slot" style="opacity:0.2"><span class="p-role">${roleKey.replace('res_','R-').toUpperCase()}</span><b>VUOTO</b></div>`;
        let stats = calculateStats(p);
        return `
            <div class="player-slot lvl-${p.level}" onclick="openDetails('${roleKey}', ${index})">
                <span class="p-lvl-tag">${p.level}</span>
                <span class="p-role">${p.role}</span>
                <span class="p-pwr">${stats.total}</span>
                <span class="p-name">${p.name}</span>
                <span class="p-upg">UPG: ${p.upgrades}/${UPG_LIMITS[p.level]}</span>
            </div>`;
    }

    function openDetails(role, index) {
        // Correzione per accedere correttamente sia a oggetti singoli che array
        let p = (index === null || (Array.isArray(squad[role]) && squad[role][index] === undefined)) ? squad[role] : squad[role][index];
        if (!p || Array.isArray(p)) p = squad[role][0]; // Fallback per portiere titolare

        selectedPlayer = { role, index };
        let stats = calculateStats(p);
        
        document.getElementById('details-modal').style.display = 'block';
        document.getElementById('m-name').innerText = p.name;
        document.getElementById('m-role').innerText = "RUOLO: " + p.role + " | LIVELLO: " + p.level;
        document.getElementById('m-pwr').innerText = stats.total;
        document.getElementById('m-upg-text').innerText = `Upgrade eseguiti: ${p.upgrades} / ${UPG_LIMITS[p.level]}`;

        let cost = (p.level * 60) + (p.upgrades * 35);
        let btn = document.getElementById('upg-action-btn');
        
        if (p.upgrades >= UPG_LIMITS[p.level]) {
            btn.innerText = "POTENZIAMENTO MASSIMO";
            btn.disabled = true;
        } else {
            btn.innerText = `UPGRADE STATS (${cost} TAPS)`;
            btn.disabled = taps < cost;
            btn.onclick = () => upgradePlayer(cost);
        }

        const labels = { vel:"Velocità", tiro:"Tiro", pass:"Passaggio", dif:"Difesa", special:stats.labelSpecial };
        let html = "";
        for(let k in labels) {
            let val = stats[k];
            let perc = Math.min(val / 7, 100);
            html += `<div><div style="display:flex; justify-content:space-between;"><small>${labels[k]}</small><small>${Math.floor(val)}</small></div><div class="stat-bar-bg"><div class="stat-bar-fill" style="width:${perc}%"></div></div></div>`;
        }
        document.getElementById('stats-container').innerHTML = html;
    }

    function upgradePlayer(cost) {
        if (taps < cost) return;
        taps -= cost;
        let p;
        if (selectedPlayer.index === null) p = squad[selectedPlayer.role];
        else p = squad[selectedPlayer.role][selectedPlayer.index];
        
        if (!p || Array.isArray(p)) p = squad[selectedPlayer.role][0];

        p.upgrades++;
        localStorage.setItem('taps', taps);
        saveAndRender();
        openDetails(selectedPlayer.role, selectedPlayer.index);
    }

    function closeDetails() { document.getElementById('details-modal').style.display = 'none'; }
    function toggleSquad() { 
        let s = document.getElementById('squad-screen');
        s.style.display = s.style.display === 'block' ? 'none' : 'block';
        if (s.style.display === 'block') renderSquad();
    }
    function showGame() { document.getElementById('squad-screen').style.display = 'none'; }
    function resetGame() { if(confirm("Resettare la squadra e i tap?")) { localStorage.clear(); location.reload(); } }

    updateUI();
</script>
</body>
</html>
