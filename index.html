<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Super Soccer Clicker</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { margin: 0; background: #1a472a; color: white; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        #header { padding: 15px; text-align: center; background: rgba(0,0,0,0.8); border-bottom: 1px solid #2e7d32; display: flex; justify-content: space-around; }
        .stat-val { font-size: 18px; font-weight: bold; display: block; }
        .stat-lab { font-size: 10px; color: #81c784; text-transform: uppercase; }

        #game-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        #ball { width: 140px; cursor: pointer; transition: transform 0.1s; user-select: none; }
        #ball:active { transform: scale(0.9); }
        
        #spin-btn { display: none; position: absolute; bottom: 40px; padding: 15px 30px; border-radius: 50px; border: none; background: gold; color: black; font-weight: bold; animation: pulse 1s infinite; z-index: 5; }
        @keyframes pulse { 0% {transform: scale(1)} 50% {transform: scale(1.1)} 100% {transform: scale(1)} }

        #navbar { display: flex; background: #000; padding: 15px 0; border-top: 1px solid #2e7d32; }
        .nav-item { flex: 1; text-align: center; font-size: 11px; color: #666; cursor: pointer; }
        .nav-item.active { color: #4caf50; font-weight: bold; }

        /* Schermata Squadra */
        #squad-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #13331e; z-index: 10; padding: 20px; box-sizing: border-box; }
        
        .pitch { display: flex; flex-direction: column; align-items: center; gap: 15px; margin-top: 10px; }
        .row { display: flex; justify-content: center; gap: 10px; width: 100%; min-height: 85px; }
        .player-slot { background: rgba(255,255,255,0.1); border: 1px solid #2e7d32; border-radius: 10px; width: 75px; height: 85px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; text-align: center; }
        
        .reserves-container { margin-top: 25px; border-top: 1px dashed #2e7d32; padding-top: 15px; width: 100%; }
        .reserves-label { text-align: center; font-size: 12px; color: #81c784; margin-bottom: 10px; display: block; }
        
        .lvl-5 { border-color: gold; color: gold; box-shadow: 0 0 8px gold; }
        .close-btn { background: #f44336; color: white; border: none; padding: 12px; width: 100%; border-radius: 10px; margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>

<div id="header">
    <div><span class="stat-lab">Taps</span><span id="tap-count" class="stat-val">0</span></div>
    <div><span class="stat-lab">Ruota</span><span id="spin-points" class="stat-val">0/100</span></div>
</div>

<div id="game-area">
    <img src="https://upload.wikimedia.org/wikipedia/commons/d/d3/Soccerball.svg" id="ball" onclick="doTap()">
    <p id="hint-text" style="color: #81c784; margin-top: 20px;">Tappa il pallone!</p>
    <button id="spin-btn" onclick="spinWheel()">🎡 GIRA LA RUOTA!</button>
</div>

<div id="squad-screen">
    <h2 style="text-align:center; margin-top:0; font-size: 1.2em;">Titolari (<span id="tit-count">0</span>/5)</h2>
    
    <div class="pitch">
        <div class="row" id="row-1"></div> <div class="row" id="row-2"></div> <div class="row" id="row-3"></div> </div>

    <div class="reserves-container">
        <span class="reserves-label">Riserve (<span id="res-count">0</span>/3)</span>
        <div class="row" id="row-reserves"></div>
    </div>

    <button class="close-btn" onclick="toggleSquad()">TORNA AL CAMPO</button>
</div>

<div id="navbar">
    <div id="nav-campo" class="nav-item active" onclick="showGame()">🏟️<br>CAMPO</div>
    <div id="nav-squadra" class="nav-item" onclick="toggleSquad()">🏃<br>SQUADRA</div>
    <div class="nav-item" style="opacity:0.3">💰<br>SHOP</div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    let taps = parseInt(localStorage.getItem('taps')) || 0;
    let players = JSON.parse(localStorage.getItem('players')) || [];

    function updateUI() {
        document.getElementById('tap-count').innerText = taps;
        let progress = taps % 100;
        document.getElementById('spin-points').innerText = progress + "/100";

        const canSpin = (progress === 0 && taps > 0 && players.length < 8);
        document.getElementById('spin-btn').style.display = canSpin ? "block" : "none";
        
        if (players.length >= 8) document.getElementById('hint-text').innerText = "Squadra al completo! 🏆";
        else document.getElementById('hint-text').innerText = "Tappa il pallone!";
    }

    function doTap() {
        taps++;
        localStorage.setItem('taps', taps);
        if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        updateUI();
    }

    function spinWheel() {
        if (players.length >= 8) return;
        const rand = Math.random() * 100;
        let lv = 1;
        if (rand < 0.5) lv = 5; else if (rand < 3) lv = 4; else if (rand < 10) lv = 3; else if (rand < 35) lv = 2;
        
        const names = ["Panchina", "Mediano", "Regista", "Bomber", "CAMPIONE"];
        players.push({ name: names[lv-1], level: lv });
        localStorage.setItem('players', JSON.stringify(players));
        
        alert("🎉 NUOVO ACQUISTO: " + names[lv-1]);
        taps++; 
        localStorage.setItem('taps', taps);
        updateUI();
    }

    function toggleSquad() {
        const screen = document.getElementById('squad-screen');
        const opening = screen.style.display !== 'block';
        screen.style.display = opening ? 'block' : 'none';
        document.getElementById('nav-campo').classList.toggle('active', !opening);
        document.getElementById('nav-squadra').classList.toggle('active', opening);
        if (opening) renderSquad();
    }

    function showGame() {
        document.getElementById('squad-screen').style.display = 'none';
        document.getElementById('nav-campo').classList.add('active');
        document.getElementById('nav-squadra').classList.remove('active');
    }

    function renderSquad() {
        const r1 = document.getElementById('row-1');
        const r2 = document.getElementById('row-2');
        const r3 = document.getElementById('row-3');
        const rr = document.getElementById('row-reserves');
        
        r1.innerHTML = ""; r2.innerHTML = ""; r3.innerHTML = ""; rr.innerHTML = "";

        players.forEach((p, i) => {
            let slot = `<div class="player-slot lvl-${p.level}"><strong>${p.name}</strong><br>LVL ${p.level}</div>`;
            if (i === 0) r1.innerHTML = slot;
            else if (i === 1 || i === 2) r2.innerHTML += slot;
            else if (i === 3 || i === 4) r3.innerHTML += slot;
            else if (i >= 5 && i < 8) rr.innerHTML += slot;
        });

        // Riempimento posti vuoti
        if (!r1.innerHTML) r1.innerHTML = '<div class="player-slot" style="opacity:0.2">VUOTO</div>';
        while (r2.children.length < 2) r2.innerHTML += '<div class="player-slot" style="opacity:0.2">VUOTO</div>';
        while (r3.children.length < 2) r3.innerHTML += '<div class="player-slot" style="opacity:0.2">VUOTO</div>';
        while (rr.children.length < 3) rr.innerHTML += '<div class="player-slot" style="opacity:0.2">VUOTO</div>';

        document.getElementById('tit-count').innerText = Math.min(players.length, 5);
        document.getElementById('res-count').innerText = Math.max(0, players.length - 5);
    }

    updateUI();
</script>
</body>
</html>
